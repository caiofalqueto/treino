<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4332">
<title>Registro de Treino</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127947;</text></svg>">
<style>
:root{--green:#2D6A4F;--green-light:#E8F5E9;--green-dark:#1B4332;--blue:#264653;--blue-light:#E3EFF3;--orange:#C65D3E;--orange-light:#FFF0EB;--purple:#7B2D8E;--purple-light:#F3E5F5;--teal:#00796B;--teal-light:#E0F2F1;--text:#1A1A1A;--text-med:#555;--text-light:#999;--bg:#F5F5F5;--card:#fff;--border:#E0E0E0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100dvh;padding-bottom:90px;-webkit-font-smoothing:antialiased}
.header{background:var(--green-dark);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.header h1{color:#fff;font-size:13px;font-weight:700;letter-spacing:1.5px}
.header-r{display:flex;align-items:center;gap:10px}
.header .date{color:rgba(255,255,255,.75);font-size:12px}
.btn-set{background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:5px 9px;color:#fff;font-size:14px;cursor:pointer}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:47px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;width:calc(100%/7);border:none;padding:8px 4px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;font-family:inherit;transition:all .2s;background:transparent}
.tab .icon{font-size:14px;line-height:1}
.tab .day{font-size:9px;font-weight:700;letter-spacing:.5px}
.tab .label{font-size:8px;opacity:.7;line-height:1}
.tab.active{color:#fff}
.wk-title{text-align:center;font-size:13px;font-weight:600;padding:10px 16px 4px;letter-spacing:.3px}
.content{padding:0 10px}
.gh{font-size:11px;font-weight:700;padding:6px 10px;margin-top:10px;margin-bottom:5px;border-radius:6px;border-left:3px solid;letter-spacing:.8px;text-transform:uppercase}
.card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-main{display:flex;gap:10px;align-items:flex-start}
.card-img{width:68px;height:68px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#F8F9FA;border:1px solid #eee}
.card-body{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.ex-subs{font-size:10px;color:var(--green);margin-bottom:4px;line-height:1.3}
.ex-subs i{font-weight:500;color:var(--text-light)}
.ex-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.pause{font-size:10px;color:var(--text-light)}
.tips{margin-top:4px}.tip{font-size:11px;color:var(--text-med);line-height:1.4;padding:2px 0 2px 10px;position:relative}
.tip::before{content:"\2022";position:absolute;left:0;color:var(--text-light)}
.weight-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.weight-left{display:flex;align-items:center;gap:4px}
.weight-label{font-size:11px;color:var(--text-light);font-weight:500}
.w-input{width:62px;height:34px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:16px;font-weight:600;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
.w-input:focus{border-color:var(--green)}.w-input::placeholder{color:#ccc;font-weight:400}
.kg{font-size:11px;color:var(--text-light)}
.last-btn{font-size:10px;color:#888;background:none;border:none;padding:2px 0;cursor:pointer;font-family:inherit}
.prog-up{color:var(--green);font-weight:600}.prog-down{color:var(--orange);font-weight:600}
.history{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:6px;border-top:1px solid var(--border)}
.hist-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.hist-grid{display:flex;flex-wrap:wrap;gap:4px}
.hist-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--card);border-radius:4px;font-size:11px}
.hist-date{color:var(--text-light);font-size:10px}.hist-w{font-weight:600}
.hist-d{font-size:10px;font-weight:600}
.save-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:480px;padding:15px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;border:none;border-radius:14px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:opacity .2s;z-index:30}
.save-btn:active{opacity:.8}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;box-shadow:0 4px 14px rgba(0,0,0,.25);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.settings{padding:14px 16px;background:#EFEFEF;border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.set-btns{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{border:none;border-radius:8px;padding:9px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.set-btn:active{opacity:.8}
.import-area{width:100%;height:56px;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:monospace;resize:none;margin-top:6px}
.settings .hint{font-size:10px;color:var(--text-light);margin-top:8px;line-height:1.4}
.danger{background:#999!important;margin-top:6px}.danger.confirm{background:#d32f2f!important}
.aero-section{margin:12px 10px 6px;background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.aero-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.aero-type-btns{display:flex;gap:6px;margin-bottom:10px}
.aero-type-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg);transition:all .2s}
.aero-type-btn.sel{color:#fff}
.aero-fields{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.aero-field{display:flex;flex-direction:column;gap:3px}
.aero-field span{font-size:10px;color:var(--text-light);font-weight:500}
.aero-input{width:70px;height:38px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:16px;font-weight:600;color:var(--text);background:var(--bg);outline:none;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
.aero-input:focus{border-color:var(--green)}.aero-input::placeholder{color:#ccc;font-weight:400;font-size:13px}
.aero-input.wide{width:100%;text-align:left;padding:0 12px;font-size:14px;font-weight:500}
.aero-unit{font-size:11px;color:var(--text-light);padding-bottom:10px}
.pace-display{background:var(--bg);border-radius:8px;padding:8px 12px;margin-top:8px;display:flex;align-items:center;gap:8px}
.pace-val{font-size:18px;font-weight:700}.pace-label{font-size:11px;color:var(--text-light)}
.aero-hero{text-align:center;padding:20px 16px 10px}
.aero-emoji{font-size:48px;margin-bottom:6px}
.aero-desc{font-size:12px;color:var(--text-light);margin-top:4px}
.aero-hist{margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}
.aero-hist-grid{display:flex;flex-direction:column;gap:4px}
.aero-hist-row{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--bg);border-radius:6px;font-size:11px}
.aero-hist-row .adate{color:var(--text-light);min-width:38px}
.aero-hist-row .aval{font-weight:600;color:var(--text)}
.aero-hist-row .aact{color:var(--text-med);font-style:italic}
.report-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:30px}
.report-header{background:var(--green-dark);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:210}
.report-header h2{color:#fff;font-size:14px;font-weight:700;letter-spacing:1px}
.btn-close{background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
.report-content{padding:12px}
.week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0}
.week-nav button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.week-nav button:disabled{opacity:.3}
.week-nav .week-label{font-size:13px;font-weight:600;color:var(--text);min-width:160px;text-align:center}
.section-title{font-size:13px;font-weight:700;color:var(--green-dark);margin:16px 0 8px;padding-left:4px;letter-spacing:.5px;text-transform:uppercase}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-cell{background:var(--card);border-radius:8px;padding:8px 4px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.day-cell .dc-day{font-size:9px;font-weight:700;color:var(--text-light);letter-spacing:.5px}
.day-cell .dc-icon{font-size:18px;margin:4px 0}
.day-cell .dc-status{font-size:8px;font-weight:600}
.day-cell.done{border:2px solid var(--green)}.day-cell.missed{opacity:.5}
.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sum-card{background:var(--card);border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.sum-card .val{font-size:22px;font-weight:700;line-height:1.2}
.sum-card .lbl{font-size:10px;color:var(--text-light);font-weight:500;margin-top:2px}
.sum-card .delta{font-size:11px;font-weight:600;margin-top:4px}
.prog-card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.prog-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.prog-bars{display:flex;align-items:flex-end;gap:3px;height:40px}
.prog-bar{flex:1;border-radius:3px 3px 0 0;position:relative;transition:height .3s}
.prog-bar .pb-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600;white-space:nowrap}
.prog-bar .pb-wk{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text-light)}
.ac-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ac-row .ac-label{font-size:10px;color:var(--text-light);min-width:40px}
.ac-row .ac-bar-bg{flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden}
.ac-row .ac-bar{height:100%;border-radius:7px;transition:width .3s}
.ac-row .ac-val{font-size:11px;font-weight:600;min-width:50px;text-align:right}
.aero-compare{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.aero-compare .ac-title{font-size:12px;font-weight:600;margin-bottom:8px}
.share-btn{width:100%;padding:14px;background:var(--green-dark);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;letter-spacing:.5px}
.share-btn:active{opacity:.8}
.no-data{text-align:center;padding:30px;color:var(--text-light);font-size:13px}

.series-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0;justify-content:space-between}
.series-left{display:flex;align-items:center;gap:6px}
.series-label{font-size:11px;color:var(--text-light);font-weight:500;white-space:nowrap}
.series-checks{display:flex;gap:5px}
.series-check{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .2s}
.series-check.done{color:#fff}
.series-check .s-num{font-size:11px}
.timer-btn{border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap;min-height:40px;flex-shrink:0}
.timer-display{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:50px;text-align:center}
.timer-display.flash{animation:timerFlash .2s ease infinite}
@keyframes timerFlash{0%,100%{background:#d32f2f;color:#fff;border-radius:8px;padding:2px 8px}50%{background:#fff;color:#d32f2f;border-radius:8px;padding:2px 8px}}
.flash-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0}
.flash-overlay.active{animation:screenFlash .2s ease-in-out 10}
@keyframes screenFlash{0%,100%{opacity:0}40%{opacity:1;background:#d32f2f}60%{opacity:1;background:#fff}}
</style>
</head>
<body>
<div id="app"></div>
<div id="flash-overlay" class="flash-overlay"></div>
<script>
var GYM={"TER":{title:"Peito + Tríceps",day:"Terça",color:"#2D6A4F",light:"#E8F5E9",type:"gym",groups:[{name:"Peito",exercises:[{id:"chest_press",name:"Supino na máquina (Chest Press)",subs:"Supino reto c/ halteres · Supino reto c/ barra",series:"3×12",pause:"60s",tips:["Costas e quadril colados no encosto — pés firmes no chão", "Empurre à frente sem travar cotovelos; retorne em 3s"],img:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Dumbbell_Bench_Press/0.jpg"},{id:"peck_deck",name:"Voador (Peck Deck)",subs:"Crucifixo c/ halteres · Crossover na polia",series:"3×12",pause:"45s",tips:["Cotovelos levemente flexionados durante todo o arco", "Feche até as pegadas se encontrarem; abra até leve alongamento"],img:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Butterfly/0.jpg"},{id:"incline_press",name:"Supino inclinado com halteres",subs:"Supino inclinado no Smith · Crossover polia baixa para alta",series:"3×12",pause:"60s",tips:["Banco a 30 graus, costas apoiadas — não arquear a lombar", "Suba os halteres convergindo sem bater; desça até cotovelos na linha do peito"],img:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Incline_Dumbbell_Press/0.jpg"}]},{name:"Tríceps",exercises:[{id:"tri_machine",name:"Tríceps na máquina (extensão sentado)",subs:"Tríceps pulley c/ barra reta · Tríceps mergulho no graviton",series:"3×12",pause:"45s",tips:["Cotovelos fixos, alinhados com os ombros — não abra", "Estenda completamente; retorne devagar sem bater o peso"],img:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Cable_One_Arm_Tricep_Extension/0.jpg"},{id:"tri_pulley",name:"Tríceps pulley com corda",subs:"Tríceps pulley c/ barra reta · Tríceps na máquina",series:"3×12",pause:"45s",tips:["Cotovelos grudados ao corpo — não incline o tronco", "Empurre para baixo e abra as pontas da corda no final"],img:"https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/Trice // ===== TIMER (timestamp-based for background support) =====
var TIMER={active:null,endTime:0,remaining:0,interval:null,flashInterval:null,fired:false};
var audioCtx=null;
function getAudioCtx(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return audioCtx}
function beep(){
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200,100,400]);
  var ov=document.getElementById("flash-overlay");
  if(ov){ov.classList.add("active");setTimeout(function(){ov.classList.remove("active")},2500)}
  var ctx=getAudioCtx();if(!ctx)return;
  function playTone(freq,delay,dur){setTimeout(function(){var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=freq;g.gain.value=0.35;o.start();setTimeout(function(){o.stop()},dur)},delay)}
  playTone(880,0,200);playTone(1100,300,200);playTone(880,600,200);playTone(1100,900,300);
}
function timerTick(){
  var now=Date.now();
  TIMER.remaining=Math.max(0,Math.ceil((TIMER.endTime-now)/1000));
  if(TIMER.remaining<=0&&!TIMER.fired){
    TIMER.fired=true;
    clearInterval(TIMER.interval);TIMER.interval=null;
    beep();
    TIMER.flashInterval=setInterval(function(){updateTimerUI()},100);
    setTimeout(function(){stopTimer();render()},3000);
  }
  updateTimerUI();
}
function startTimer(exId,seconds){
  stopTimer();
  TIMER.active=exId;TIMER.fired=false;
  TIMER.endTime=Date.now()+seconds*1000;
  TIMER.remaining=seconds;
  updateTimerUI();
  TIMER.interval=setInterval(timerTick,250);
}
function stopTimer(){
  if(TIMER.interval){clearInterval(TIMER.interval);TIMER.interval=null}
  if(TIMER.flashInterval){clearInterval(TIMER.flashInterval);TIMER.flashInterval=null}
  TIMER.active=null;TIMER.remaining=0;TIMER.fired=false;
}
// Re-check timer when app comes back to foreground
document.addEventListener("visibilitychange",function(){
  if(!document.hidden&&TIMER.active&&TIMER.interval){timerTick()}
  if(!document.hidden&&TIMER.active&&!TIMER.interval&&!TIMER.fired){
    var now=Date.now();TIMER.remaining=Math.max(0,Math.ceil((TIMER.endTime-now)/1000));
    if(TIMER.remaining<=0){TIMER.fired=true;beep();TIMER.flashInterval=setInterval(function(){updateTimerUI()},100);setTimeout(function(){stopTimer();render()},3000)}
    else{TIMER.interval=setInterval(timerTick,250)}
  }
});
function updateTimerUI(){
  var el=document.getElementById("timer-"+TIMER.active);
  if(!el)return;
  var m=Math.floor(TIMER.remaining/60);var s=TIMER.remaining%60;
  el.textContent=m+":"+(s<10?"0":"")+s;
  if(TIMER.remaining<=0&&TIMER.flashInterval){el.classList.add("flash")}else{el.classList.remove("flash")}
  var btn=document.getElementById("tbtn-"+TIMER.active);
  if(btn){
    if(TIMER.remaining>0){btn.textContent="\u23F9"}
    else if(TIMER.remaining<=0&&TIMER.flashInterval){btn.textContent="\u2705"}
  }
}
function toggleTimer(exId,seconds,totalSets){
  if(TIMER.active===exId){stopTimer();render();return}
  // Auto-increment series count
  var doneSets=getCompletedSets(exId);
  if(doneSets<totalSets){
    var k=getSeriesKey(exId);
    if(!S.data[k])S.data[k]=[];
    var entry=null;var idx=-1;
    for(var i=0;i<S.data[k].length;i++){if(S.data[k][i].date===todayStr()){entry=S.data[k][i];idx=i}}
    var newCount=doneSets+1;
    if(!entry){S.data[k].push({date:todayStr(),count:newCount})}
    else{entry.count=newCount;S.data[k][idx]=entry}
    save(S.data);
  }
  startTimer(exId,seconds);
  render();
}
function parsePauseSeconds(pauseStr){
  if(!pauseStr)return 60;
  var m=pauseStr.match(/(\d+)s/);
  return m?parseInt(m[1]):60;
}

// ===== SERIES COUNTER =====
function getSeriesKey(exId){return "sets_"+exId+"_"+todayStr()}
function getCompletedSets(exId){var k=getSeriesKey(exId);var v=S.data[k];if(!v||!Array.isArray(v))return 0;var entry=null;for(var i=0;i<v.length;i++){if(v[i].date===todayStr())entry=v[i]}return entry?entry.count:0}
function toggleSet(exId,setNum,totalSets,pauseSec){
  var k=getSeriesKey(exId);
  if(!S.data[k])S.data[k]=[];
  var entry=null;var idx=-1;
  for(var i=0;i<S.data[k].length;i++){if(S.data[k][i].date===todayStr()){entry=S.data[k][i];idx=i}}
  var current=entry?entry.count:0;
  if(setNum<=current){
    // uncheck
    if(entry){entry.count=setNum-1;S.data[k][idx]=entry}
  }else{
    // check
    if(!entry){S.data[k].push({date:todayStr(),count:setNum})}
    else{entry.count=setNum;S.data[k][idx]=entry}
    // auto-start timer if not last set
    if(setNum<totalSets&&pauseSec>0){startTimer(exId,pauseSec)}
  }
  save(S.data);render();
}
function parseSeriesCount(seriesStr){
  if(!seriesStr)return 3;
  var m=seriesStr.match(/(\d+)/);
  return m?parseInt(m[1]):3;
}

function flash(m){S.toast=m;render();setTimeout(function(){S.toast=null;render()},2500)}
function getLast(id){var e=S.data[id];return e&&e.length?e[e.length-1]:null}
function getHist(id){return(S.data[id]||[]).slice(-10)}
function getProg(id){var e=S.data[id]||[];if(e.length<2)return null;var l=e[e.length-1].weight,p=e[e.length-2].weight;return l>p?"up":l<p?"down":"same"}

function calcPace(dist,mins){
  if(!dist||!mins||dist<=0||mins<=0)return null;
  var p=mins/dist;var m=Math.floor(p);var s=Math.round((p-m)*60);
  return m+":"+(s<10?"0":"")+s;
}

function doSaveGym(){
  var t=todayStr(),tabObj,wk,nd=clone(S.data),any=false;
  for(var i=0;i<TABS.length;i++){if(TABS[i].key===S.tab){tabObj=TABS[i];break}}
  wk=GYM[tabObj.gymKey];
  for(var gi=0;gi<wk.groups.length;gi++){
    var g=wk.groups[gi];
    for(var ei=0;ei<g.exercises.length;ei++){
      var ex=g.exercises[ei],v=S.wts[ex.id];
      if(v&&parseFloat(v)>0){
        any=true;if(!nd[ex.id])nd[ex.id]=[];
        var w=parseFloat(v),idx=-1;
        for(var k=0;k<nd[ex.id].length;k++){if(nd[ex.id][k].date===t){idx=k;break}}
        if(idx>=0)nd[ex.id][idx]={date:t,weight:w};else nd[ex.id].push({date:t,weight:w});
      }
    }
  }
  // Also save aero if filled
  var aid=tabObj.aeroId;
  if(S.aero.dist||S.aero.mins||S.aero.kcal){
    any=true;
    if(!nd[aid])nd[aid]=[];
    var entry={date:t};
    if(S.aero.tipo)entry.tipo=S.aero.tipo;
    if(S.aero.dist&&parseFloat(S.aero.dist)>0)entry.dist=parseFloat(S.aero.dist);
    if(S.aero.mins&&parseFloat(S.aero.mins)>0)entry.mins=parseFloat(S.aero.mins);
    if(S.aero.kcal&&parseFloat(S.aero.kcal)>0)entry.kcal=parseFloat(S.aero.kcal);
    var pace=calcPace(entry.dist,entry.mins);if(pace)entry.pace=pace;
    var aidx=-1;for(var k=0;k<nd[aid].length;k++){if(nd[aid][k].date===t){aidx=k;break}}
    if(aidx>=0)nd[aid][aidx]=entry;else nd[aid].push(entry);
  }
  if(!any){flash("Preencha pelo menos um campo");return}
  S.data=nd;var ok=save(nd);S.wts={};S.aero={};
  flash(ok?"\u2713 Treino salvo!":"Erro ao salvar");
}

  if(S.aero.kcal&&parseFloat(S.aero.kcal)>0)entry.kcal=parseFloat(S.aero.kcal);
  if(S.aero.act)entry.act=S.aero.act;
  var pace=calcPace(entry.dist,entry.mins);if(pace)entry.pace=pace;
  var idx=-1;for(var k=0;k<nd[id].length;k++){if(nd[id][k].date===t){idx=k;break}}
  if(idx>=0)nd[id][idx]=entry;else nd[id].push(entry);
  S.data=nd;var ok=save(nd);S.aero={};
  flash(ok?"\u2713 Atividade salva!":"Erro ao salvar");
}

function doExport(){
  var enc=btoa(unescape(encodeURIComponent(JSON.stringify(S.data))));
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(enc).then(function(){flash("\u2713 Dados copiados!")}).catch(function(){prompt("Copie:",enc)});
  else prompt("Copie:",enc);
}
function doImport(){
  var a=document.getElementById("imp-area");if(!a||!a.value.trim()){flash("Cole o codigo");return}
  try{var p=JSON.parse(decodeURIComponent(escape(atob(a.value.trim()))));S.data=p;save(p);S.imp=false;S.sets=false;flash("\u2713 Importado!")}catch(e){flash("Codigo invalido")}
}
function doClear(){if(!S.clr){S.clr=true;render();return}S.data={};S.wts={};S.aero={};save({});S.clr=false;S.sets=false;flash("Dados apagados")}

function render(){
  var tabObj;
  for(var i=0;i<TABS.length;i++){if(TABS[i].key===S.tab){tabObj=TABS[i];break}}
  var c=tabObj.color,n=countE(S.data);

  var h='<div class="header"><h1>\ud83c\udfcb\ufe0f REGISTRO SEMANAL</h1>';
  h+='<div class="header-r"><span class="date">'+fmtD(todayStr())+'</span>';
  h+='<button class="btn-set" onclick="R.open=true;R.weekOffset=0;render();renderReport()" style="font-size:12px">\ud83d\udcca</button>';
  h+='<button class="btn-set" onclick="S.sets=!S.sets;S.clr=false;render()">\u2699</button>';
  h+='</div></div>';

  if(S.sets){
    h+='<div class="settings"><div class="set-row"><span style="font-size:12px;color:var(--text-med)">\ud83d\udfe2 localStorage ativo</span>';
    h+='<span style="font-size:11px;color:var(--text-light)"> \u2022 '+n+' registros</span></div>';
    h+='<div class="set-btns">';
    h+='<button class="set-btn" style="background:var(--green)" onclick="doExport()">\ud83d\udce4 Exportar</button>';
    h+='<button class="set-btn" style="background:var(--blue)" onclick="S.imp=!S.imp;render()">\ud83d\udce5 Importar</button>';
    h+='<button class="set-btn danger '+(S.clr?"confirm":"")+'" onclick="doClear()">'+(S.clr?"\u26a0 Confirmar":"\ud83d\uddd1 Limpar")+'</button>';
    h+='</div>';
    if(S.imp){
      h+='<textarea id="imp-area" class="import-area" placeholder="Cole o codigo exportado"></textarea>';
      h+='<button class="set-btn" style="background:var(--orange);width:100%;margin-top:4px" onclick="doImport()">Importar</button>';
    }
    h+='<div class="hint">Exporte para backup. Importe para restaurar em outro dispositivo.</div></div>';
  }

  h+='<div class="tabs">';
  for(var ti=0;ti<TABS.length;ti++){
    var tb=TABS[ti],act=S.tab===tb.key;
    h+='<button class="tab'+(act?" active":"")+'" style="'+(act?"background:"+tb.color+";color:#fff":"color:#666")+'"';
    h+=' onclick="S.tab=\''+tb.key+'\';S.hist=null;S.wts={};S.aero={};render()">';
    h+='<span class="icon">'+tb.icon+'</span><span class="day">'+tb.key+'</span><span class="label">'+tb.label+'</span></button>';
  }
  h+='</div>';

  if(tabObj.type==="gym"){
    var wk=GYM[tabObj.gymKey];
    h+='<div class="wk-title" style="color:'+c+'">'+wk.title+'</div><div class="content">';
    for(var gi=0;gi<wk.groups.length;gi++){
      var g=wk.groups[gi];
      h+='<div class="gh" style="background:'+wk.light+';border-left-color:'+c+'">'+g.name+'</div>';
      for(var ei=0;ei<g.exercises.length;ei++){
        var ex=g.exercises[ei];
        var last=getLast(ex.id),prog=getProg(ex.id),hist=getHist(ex.id),isO=S.hist===ex.id;
        var cv=S.wts[ex.id]||"";
        h+='<div class="card" id="card-'+ex.id+'"><div class="card-main">';
        h+='<img class="card-img" src="'+ex.img+'" alt="'+ex.name+'" onerror="this.src=\'\';this.style.background=\''+wk.light+'\';this.style.display=\'flex\';this.style.alignItems=\'center\';this.style.justifyContent=\'center\';this.alt=\'\ud83c\udfcb\ufe0f\'">';
        h+='<div class="card-body"><div class="ex-name">'+ex.name+'</div>';
        h+='<div class="ex-subs"><i>Alt:</i> '+ex.subs+'</div>';
        h+='<div class="ex-meta"><span class="badge" style="background:'+wk.light+';color:'+c+'">'+ex.series+'</span>';
        h+='<span class="pause">Pausa: '+ex.pause+'</span></div>';
        h+='<div class="tips">';
        for(var ti2=0;ti2<ex.tips.length;ti2++){h+='<div class="tip">'+ex.tips[ti2]+'</div>'}
        h+='</div></div></div>';
        h+='<div class="weight-row"><div class="weight-left">';
        h+='<span class="weight-label">Peso:</span>';
        h+='<input type="number" inputmode="decimal" step="0.5" min="0" class="w-input"';
        h+=' placeholder="'+(last?last.weight:"\u2014")+'" value="'+cv+'"';
        h+=' oninput="S.wts[\''+ex.id+'\']=this.value" style="'+(cv?"border-color:"+c:"")+'">';
        h+='<span class="kg">kg</span></div>';
        if(last){
          var pc=prog==="up"?"prog-up":prog==="down"?"prog-down":"";
          var ar=prog==="up"?"\u2191":prog==="down"?"\u2193":prog==="same"?"=":"";
          h+='<button class="last-btn '+pc+'" onclick="S.hist=S.hist===\''+ex.id+'\'?null:\''+ex.id+'\';render()">';
          h+=ar+' Ultimo: '+last.weight+'kg <span style="font-size:9px;margin-left:2px">'+(isO?"\u25b2":"\u25bc")+'</span></button>';
        }
        h+='</div>';
        // Series counter
        var totalSets=parseSeriesCount(ex.series);
        var doneSets=getCompletedSets(ex.id);
        var pauseSec=parsePauseSeconds(ex.pause);
        var timerActive=TIMER.active===ex.id;
        var allDone=doneSets>=totalSets;
        // Series + Timer on same row
        h+='<div class="series-row">';
        h+='<div class="series-left"><span class="series-label">Series:</span><div class="series-checks">';
        for(var si=1;si<=totalSets;si++){
          var isDone=si<=doneSets;
          h+='<div class="series-check'+(isDone?' done':'')+'" style="'+(isDone?'background:'+c+';border-color:'+c:'')+'">';
          h+='<span class="s-num">'+(isDone?'\u2713':si)+'</span></div>';
        }
        h+='</div></div>';
        // Timer button on right
        if(allDone&&!timerActive){
          h+='<button class="timer-btn" style="background:#4CAF50;color:#fff">\u2705 Completo!</button>';
        }else if(timerActive){
          h+='<div style="display:flex;align-items:center;gap:6px">';
          h+='<span id="timer-'+ex.id+'" class="timer-display'+(TIMER.remaining<=0&&TIMER.flashInterval?' flash':'')+'" style="color:'+c+'">'+Math.floor(TIMER.remaining/60)+':'+(TIMER.remaining%60<10?'0':'')+(TIMER.remaining%60)+'</span>';
          h+='<button id="tbtn-'+ex.id+'" class="timer-btn" style="background:'+c+';color:#fff" onclick="toggleTimer(\''+ex.id+'\','+pauseSec+','+totalSets+')">\u23F9</button>';
          h+='</div>';
        }else{
          h+='<button id="tbtn-'+ex.id+'" class="timer-btn" style="background:'+wk.light+';color:'+c+'" onclick="toggleTimer(\''+ex.id+'\','+pauseSec+','+totalSets+')">\u23F1 '+ex.pause+'</button>';
        }
        h+='</div>';
        if(isO&&hist.length>0){
          h+='<div class="history"><div class="hist-label">Historico</div><div class="hist-grid">';
          for(var hi=0;hi<hist.length;hi++){
            var hh=hist[hi],dh="";
            if(hi>0){var dd=hh.weight-hist[hi-1].weight;var dcc=dd>0?"prog-up":dd<0?"prog-down":"";var dt=dd>0?"+"+dd.toFixed(1):dd<0?dd.toFixed(1):"=";dh='<span class="hist-d '+dcc+'">'+dt+'</span>'}
            h+='<div class="hist-chip"><span class="hist-date">'+fmtD(hh.date)+'</span><span class="hist-w">'+hh.weight+'kg</span>'+dh+'</div>';
          }
          h+='</div></div>';
        }
        h+='</div>';
      }
    }
    h+='</div>';
    // Aerobic section for gym days
    h+=renderAeroCard(tabObj.aeroId,c,false,true);
    h+='<button class="save-btn" style="background:'+c+'" onclick="doSaveGym()">Salvar Treino</button>';

  } else if(tabObj.type==="aero"){
    h+='<div class="aero-hero"><div class="aero-emoji">'+tabObj.icon+'</div>';
    h+='<div class="wk-title" style="color:'+c+';padding:0">'+tabObj.aeroName+'</div>';
    h+='<div class="aero-desc">Registre sua sessao de hoje</div></div>';
    h+=renderAeroCard(tabObj.aeroId,c,false,false);
    h+='<button class="save-btn" style="background:'+c+'" onclick="doSaveAero()">Salvar Atividade</button>';

  } else {
    h+='<div class="aero-hero"><div class="aero-emoji">'+tabObj.icon+'</div>';
    h+='<div class="wk-title" style="color:'+c+';padding:0">Atividade Livre</div>';
    h+='<div class="aero-desc">Registre qualquer atividade</div></div>';
    h+=renderAeroCard(tabObj.aeroId,c,true,false);
    h+='<button class="save-btn" style="background:'+c+'" onclick="doSaveAero()">Salvar Atividade</button>';
  }

  if(S.toast)h+='<div class="toast">'+S.toast+'</div>';
  document.getElementById("app").innerHTML=h;
}

// === REPORT ===
function getMonday(d){var dt=new Date(d+"T00:00:00");var day=dt.getDay();var diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDays(ds,n){var d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getWeekDates(off){var now=new Date();now.setDate(now.getDate()+off*7);var mon=getMonday(now.toISOString().slice(0,10));return [0,1,2,3,4,5,6].map(function(i){return addDays(mon,i)})}

function getWeekTotals(dates){
  var totalKcal=0,totalMins=0,totalDist=0,sessions=0;
  for(var i=0;i<TABS.length;i++){
    var tab=TABS[i],date=dates[i];
    if(tab.type==="gym"){
      var wk=GYM[tab.gymKey],any=false;
      for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length;ei++){
        var e=(S.data[g.exercises[ei].id]||[]);for(var k=0;k<e.length;k++){if(e[k].date===date)any=true}
      }}
      // check gym aero too
      var ae=(S.data[tab.aeroId]||[]);for(var k=0;k<ae.length;k++){if(ae[k].date===date){any=true;totalKcal+=(ae[k].kcal||0);totalMins+=(ae[k].mins||0);totalDist+=(ae[k].dist||0)}}
      if(any)sessions++;
    } else {
      var id=tab.aeroId;var entries=S.data[id]||[];
      for(var k=0;k<entries.length;k++){if(entries[k].date===date){sessions++;totalKcal+=(entries[k].kcal||0);totalMins+=(entries[k].mins||0);totalDist+=(entries[k].dist||0)}}
    }
  }
  return {totalKcal:totalKcal,totalMins:totalMins,totalDist:Math.round(totalDist*10)/10,sessions:sessions};
}

function getExerciseHistory(exId,num){
  var entries=S.data[exId]||[];var weeks={};
  for(var i=0;i<entries.length;i++){var mon=getMonday(entries[i].date);if(!weeks[mon]||entries[i].weight>weeks[mon])weeks[mon]=entries[i].weight}
  var allW=Object.keys(weeks).sort().slice(-num);
  return allW.map(function(w){return {week:w,weight:weeks[w]}});
}

function renderReport(){
  var dates=getWeekDates(R.weekOffset);
  var prevDates=getWeekDates(R.weekOffset-1);
  var totals=getWeekTotals(dates);
  var prev=getWeekTotals(prevDates);
  var dayNames=["SEG","TER","QUA","QUI","SEX","SAB","DOM"];

  var h='<div class="report-overlay"><div class="report-header"><h2>\ud83d\udcca RELATORIO SEMANAL</h2>';
  h+='<button class="btn-close" onclick="R.open=false;render()">\u2715 Fechar</button></div>';
  h+='<div class="report-content">';

  h+='<div class="week-nav">';
  h+='<button onclick="R.weekOffset--;renderReport()">\u25c0</button>';
  h+='<div class="week-label">'+fmtD(dates[0])+' \u2014 '+fmtD(dates[6])+'</div>';
  h+='<button onclick="R.weekOffset++;renderReport()"'+(R.weekOffset>=0?" disabled":"")+'>\u25b6</button></div>';

  h+='<div class="section-title">Visao da Semana</div><div class="week-grid">';
  for(var i=0;i<7;i++){
    var tab=TABS[i],date=dates[i],done=false;
    if(tab.type==="gym"){
      var wk=GYM[tab.gymKey];
      for(var gi=0;gi<wk.groups.length&&!done;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length&&!done;ei++){
        var entries=S.data[g.exercises[ei].id]||[];for(var k=0;k<entries.length;k++){if(entries[k].date===date)done=true}
      }}
      if(!done){var ae=S.data[tab.aeroId]||[];for(var k=0;k<ae.length;k++){if(ae[k].date===date)done=true}}
    }else{var entries=S.data[tab.aeroId]||[];for(var k=0;k<entries.length;k++){if(entries[k].date===date)done=true}}
    var isPast=date<=todayStr();
    h+='<div class="day-cell '+(done?"done":isPast?"missed":"")+'">';
    h+='<div class="dc-day">'+dayNames[i]+'</div><div class="dc-icon">'+tab.icon+'</div>';
    h+='<div class="dc-status" style="color:'+(done?"var(--green)":"var(--text-light)")+'">'+(done?"\u2713":"\u2014")+'</div></div>';
  }
  h+='</div>';

  function deltaColor(v){return v>0?"var(--green)":v<0?"var(--orange)":"var(--text-light)"}
  function deltaStr(v){return v>0?"+"+v:String(v)}
  var kd=totals.totalKcal-prev.totalKcal,md=totals.totalMins-prev.totalMins,sd=totals.sessions-prev.sessions,dd=Math.round((totals.totalDist-prev.totalDist)*10)/10;

  h+='<div class="summary-cards">';
  h+='<div class="sum-card"><div class="val" style="color:var(--green)">'+totals.sessions+'/7</div><div class="lbl">Sessoes</div>';
  if(prev.sessions>0)h+='<div class="delta" style="color:'+deltaColor(sd)+'">'+deltaStr(sd)+' vs anterior</div>';
  h+='</div>';
  h+='<div class="sum-card"><div class="val" style="color:var(--orange)">'+totals.totalKcal+'</div><div class="lbl">kcal (aerobico)</div>';
  if(prev.totalKcal>0)h+='<div class="delta" style="color:'+deltaColor(kd)+'">'+deltaStr(kd)+' kcal</div>';
  h+='</div>';
  h+='<div class="sum-card"><div class="val" style="color:var(--blue)">'+totals.totalDist+'</div><div class="lbl">km percorridos</div>';
  if(prev.totalDist>0)h+='<div class="delta" style="color:'+deltaColor(dd)+'">'+deltaStr(dd)+' km</div>';
  h+='</div>';
  h+='<div class="sum-card"><div class="val" style="color:var(--purple)">'+totals.totalMins+'</div><div class="lbl">min (aerobico)</div>';
  if(prev.totalMins>0)h+='<div class="delta" style="color:'+deltaColor(md)+'">'+deltaStr(md)+' min</div>';
  h+='</div></div>';

  // Weight progression
  var hasEx=false;
  for(var gk=0;gk<["TER","QUI","SAB"].length;gk++){
    var key=["TER","QUI","SAB"][gk],wk=GYM[key];
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length;ei++){
      if((S.data[g.exercises[ei].id]||[]).length>0){hasEx=true;break}
    }}}

  if(hasEx){
    h+='<div class="section-title">Progressao de Carga</div>';
    for(var gk=0;gk<["TER","QUI","SAB"].length;gk++){
      var key=["TER","QUI","SAB"][gk],wk=GYM[key];
      for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length;ei++){
        var ex=g.exercises[ei],hist=getExerciseHistory(ex.id,6);
        if(hist.length===0)continue;
        var maxW=0;for(var k=0;k<hist.length;k++){if(hist[k].weight>maxW)maxW=hist[k].weight}
        var deltaH="";
        if(hist.length>=2){
          var d=hist[hist.length-1].weight-hist[hist.length-2].weight;
          if(d!==0){var dc=d>0?"var(--green)":"var(--orange)";var ds=d>0?"+":"";deltaH='<span style="color:'+dc+';font-size:11px;font-weight:600">'+ds+d.toFixed(1)+'kg</span>'}
        }
        h+='<div class="prog-card"><div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div class="prog-name">'+ex.name+'</div>'+deltaH+'</div>';
        h+='<div class="prog-bars" style="margin-bottom:14px">';
        for(var k=0;k<hist.length;k++){
          var pct=maxW>0?Math.max(8,(hist[k].weight/maxW)*100):8;
          var isLast=k===hist.length-1;
          var barC=isLast?wk.color:"#ccc";
          h+='<div class="prog-bar" style="height:'+pct+'%;background:'+barC+'">';
          h+='<div class="pb-val" style="color:'+(isLast?wk.color:"var(--text-light)")+'">'+hist[k].weight+'</div>';
          h+='<div class="pb-wk">'+fmtD(hist[k].week)+'</div></div>';
        }
        h+='</div></div>';
      }}
    }
  }

  h+='<button class="share-btn" onclick="exportReportText()">Copiar Relatorio como Texto</button>';
  if(!hasEx)h+='<div class="no-data">Registre seus treinos para ver o relatorio de progressao.</div>';
  h+='</div></div>';
  document.getElementById("app").insertAdjacentHTML("beforeend",h);
}

function exportReportText(){
  var dates=getWeekDates(R.weekOffset),totals=getWeekTotals(dates);
  var txt="RELATORIO SEMANAL\n"+fmtD(dates[0])+" - "+fmtD(dates[6])+"\n";
  txt+="Sessoes: "+totals.sessions+"/7\nKcal: "+totals.totalKcal+"\nDistancia: "+totals.totalDist+"km\nTempo: "+totals.totalMins+"min\n\n";
  for(var gk=0;gk<["TER","QUI","SAB"].length;gk++){
    var key=["TER","QUI","SAB"][gk],wk=GYM[key];
    txt+=wk.title+" ("+wk.day+")\n";
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length;ei++){
      var ex=g.exercises[ei],entries=S.data[ex.id]||[];
      for(var k=0;k<entries.length;k++){if(dates.indexOf(entries[k].date)>=0){txt+="  "+ex.name+": "+entries[k].weight+"kg\n";break}}
    }}txt+="\n";
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(function(){flash("\u2713 Copiado!")}).catch(function(){prompt("Copie:",txt)});
  else prompt("Copie:",txt);
}

render();
</script></body></html>
