<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4332">
<title>Registro de Treino</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127947;</text></svg>">
<style>
:root{--green:#2D6A4F;--green-light:#E8F5E9;--green-dark:#1B4332;--blue:#264653;--blue-light:#E3EFF3;--orange:#C65D3E;--orange-light:#FFF0EB;--purple:#7B2D8E;--purple-light:#F3E5F5;--teal:#00796B;--teal-light:#E0F2F1;--text:#1A1A1A;--text-med:#555;--text-light:#999;--bg:#F5F5F5;--card:#fff;--border:#E0E0E0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100dvh;padding-bottom:90px;-webkit-font-smoothing:antialiased}
.header{background:var(--green-dark);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.header h1{color:#fff;font-size:13px;font-weight:700;letter-spacing:1.5px}
.header-r{display:flex;align-items:center;gap:10px}
.header .date{color:rgba(255,255,255,.75);font-size:12px}
.btn-set{background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:5px 9px;color:#fff;font-size:14px;cursor:pointer}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:47px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;width:calc(100%/7);border:none;padding:8px 4px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;font-family:inherit;transition:all .2s;background:transparent}
.tab .icon{font-size:14px;line-height:1}
.tab .day{font-size:9px;font-weight:700;letter-spacing:.5px}
.tab .label{font-size:8px;opacity:.7;line-height:1}
.tab.active{color:#fff}
.wk-title{text-align:center;font-size:13px;font-weight:600;padding:10px 16px 4px;letter-spacing:.3px}
.content{padding:0 10px}
.gh{font-size:11px;font-weight:700;padding:6px 10px;margin-top:10px;margin-bottom:5px;border-radius:6px;border-left:3px solid;letter-spacing:.8px;text-transform:uppercase}
.card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-main{display:flex;gap:10px;align-items:flex-start}
.card-img{width:68px;height:68px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#F8F9FA;border:1px solid #eee}
.card-body{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
.ex-subs{font-size:10px;color:var(--green);margin-bottom:4px;line-height:1.3}
.ex-subs i{font-weight:500;color:var(--text-light)}
.ex-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.pause{font-size:10px;color:var(--text-light)}
.tips{margin-top:4px}.tip{font-size:11px;color:var(--text-med);line-height:1.4;padding:2px 0 2px 10px;position:relative}
.tip::before{content:"\2022";position:absolute;left:0;color:var(--text-light)}
.weight-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.weight-left{display:flex;align-items:center;gap:4px}
.weight-label{font-size:11px;color:var(--text-light);font-weight:500}
.w-input{width:62px;height:34px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:16px;font-weight:600;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
.w-input:focus{border-color:var(--green)}.w-input::placeholder{color:#ccc;font-weight:400}
.kg{font-size:11px;color:var(--text-light)}
.last-btn{font-size:10px;color:#888;background:none;border:none;padding:2px 0;cursor:pointer;font-family:inherit}
.prog-up{color:var(--green);font-weight:600}.prog-down{color:var(--orange);font-weight:600}
.history{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:6px;border-top:1px solid var(--border)}
.hist-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.hist-grid{display:flex;flex-wrap:wrap;gap:4px}
.hist-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--card);border-radius:4px;font-size:11px}
.hist-date{color:var(--text-light);font-size:10px}.hist-w{font-weight:600}
.hist-d{font-size:10px;font-weight:600}
.save-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:480px;padding:15px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;border:none;border-radius:14px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:opacity .2s;z-index:30}
.save-btn:active{opacity:.8}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;box-shadow:0 4px 14px rgba(0,0,0,.25);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.settings{padding:14px 16px;background:#EFEFEF;border-bottom:1px solid var(--border)}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.set-btns{display:flex;gap:6px;flex-wrap:wrap}
.set-btn{border:none;border-radius:8px;padding:9px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.set-btn:active{opacity:.8}
.import-area{width:100%;height:56px;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:monospace;resize:none;margin-top:6px}
.settings .hint{font-size:10px;color:var(--text-light);margin-top:8px;line-height:1.4}
.danger{background:#999!important;margin-top:6px}.danger.confirm{background:#d32f2f!important}
.aero-section{margin:12px 10px 6px;background:var(--card);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.aero-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.aero-type-btns{display:flex;gap:6px;margin-bottom:10px}
.aero-type-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg);transition:all .2s}
.aero-type-btn.sel{color:#fff}
.aero-fields{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.aero-field{display:flex;flex-direction:column;gap:3px}
.aero-field span{font-size:10px;color:var(--text-light);font-weight:500}
.aero-input{width:70px;height:38px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:16px;font-weight:600;color:var(--text);background:var(--bg);outline:none;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
.aero-input:focus{border-color:var(--green)}.aero-input::placeholder{color:#ccc;font-weight:400;font-size:13px}
.aero-input.wide{width:100%;text-align:left;padding:0 12px;font-size:14px;font-weight:500}
.aero-unit{font-size:11px;color:var(--text-light);padding-bottom:10px}
.pace-display{background:var(--bg);border-radius:8px;padding:8px 12px;margin-top:8px;display:flex;align-items:center;gap:8px}
.pace-val{font-size:18px;font-weight:700}.pace-label{font-size:11px;color:var(--text-light)}
.aero-hero{text-align:center;padding:20px 16px 10px}
.aero-emoji{font-size:48px;margin-bottom:6px}
.aero-desc{font-size:12px;color:var(--text-light);margin-top:4px}
.aero-hist{margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}
.aero-hist-grid{display:flex;flex-direction:column;gap:4px}
.aero-hist-row{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--bg);border-radius:6px;font-size:11px}
.aero-hist-row .adate{color:var(--text-light);min-width:38px}
.aero-hist-row .aval{font-weight:600;color:var(--text)}
.aero-hist-row .aact{color:var(--text-med);font-style:italic}
.report-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:30px}
.report-header{background:linear-gradient(135deg,#1a237e,#4a148c);padding:16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:210}
.report-header h2{color:#fff;font-size:15px;font-weight:800;letter-spacing:1.5px}
.btn-close{background:rgba(255,255,255,.15);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;backdrop-filter:blur(4px)}
.report-content{padding:14px}
.week-nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 0 12px}
.week-nav button{background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.week-nav button:disabled{opacity:.3}
.week-nav .week-label{font-size:13px;font-weight:700;color:var(--text);min-width:160px;text-align:center}
.section-title{font-size:12px;font-weight:800;color:#4a148c;margin:18px 0 10px;padding-left:4px;letter-spacing:1px;text-transform:uppercase}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.day-cell{background:var(--card);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .2s}
.day-cell .dc-day{font-size:9px;font-weight:700;color:var(--text-light);letter-spacing:.5px}
.day-cell .dc-icon{font-size:18px;margin:4px 0}
.day-cell .dc-status{font-size:8px;font-weight:600}
.day-cell.done{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:2px solid #4CAF50}.day-cell.missed{opacity:.4}
.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sum-card{background:var(--card);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;overflow:hidden}
.sum-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.sum-card.sc-green::before{background:linear-gradient(90deg,#4CAF50,#81C784)}
.sum-card.sc-orange::before{background:linear-gradient(90deg,#FF9800,#FFB74D)}
.sum-card.sc-blue::before{background:linear-gradient(90deg,#1976D2,#64B5F6)}
.sum-card.sc-purple::before{background:linear-gradient(90deg,#7B1FA2,#BA68C8)}
.sum-card.sc-red::before{background:linear-gradient(90deg,#D32F2F,#EF5350)}
.sum-card .val{font-size:24px;font-weight:800;line-height:1.1}
.sum-card .lbl{font-size:10px;color:var(--text-light);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.sum-card .delta{font-size:11px;font-weight:700;margin-top:4px}
.sum-card .avg-line{font-size:9px;color:var(--text-light);margin-top:2px}
.prog-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.prog-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px}
.prog-bars{display:flex;align-items:flex-end;gap:4px;height:45px}
.prog-bar{flex:1;border-radius:4px 4px 0 0;position:relative;transition:height .5s ease}
.prog-bar .pb-val{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;white-space:nowrap}
.prog-bar .pb-wk{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text-light)}
.vol-card{background:linear-gradient(135deg,#1a237e,#283593);border-radius:12px;padding:14px;margin-bottom:8px;color:#fff}
.vol-card .vol-title{font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:1px}
.vol-card .vol-val{font-size:28px;font-weight:800;margin:4px 0}
.vol-card .vol-sub{font-size:11px;opacity:.6}
.vol-card .vol-delta{font-size:12px;font-weight:700;margin-top:4px}
.pbar-wrap{background:rgba(255,255,255,.1);border-radius:6px;height:8px;margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;border-radius:6px;transition:width .5s ease}
.share-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4a148c,#7b1fa2);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;letter-spacing:.5px}
.share-btn:active{transform:scale(.98)}
.no-data{text-align:center;padding:30px;color:var(--text-light);font-size:13px}

.series-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid #f0f0f0;justify-content:space-between}
.series-left{display:flex;align-items:center;gap:6px}
.series-label{font-size:11px;color:var(--text-light);font-weight:500;white-space:nowrap}
.series-checks{display:flex;gap:5px}
.series-check{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .2s}
.series-check.done{color:#fff}
.series-check .s-num{font-size:11px}
.timer-btn{border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap;min-height:40px;flex-shrink:0}
.timer-display{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;min-width:50px;text-align:center}
.timer-display.flash{animation:timerFlash .2s ease infinite}
@keyframes timerFlash{0%,100%{background:#d32f2f;color:#fff;border-radius:8px;padding:2px 8px}50%{background:#fff;color:#d32f2f;border-radius:8px;padding:2px 8px}}
.flash-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0}
.flash-overlay.active{animation:screenFlash .2s ease-in-out 10}
@keyframes screenFlash{0%,100%{opacity:0}40%{opacity:1;background:#d32f2f}60%{opacity:1;background:#fff}}
.floating-timer{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:998;background:var(--card);border:2px solid #d32f2f;border-radius:14px;padding:6px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);min-width:200px;justify-content:center}
.floating-timer .ft-name{font-size:11px;color:var(--text-med);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.floating-timer .ft-time{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;color:#d32f2f}
.floating-timer .ft-time.flash{animation:timerFlash .2s ease infinite}
.floating-timer .ft-stop{background:#d32f2f;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.obs-field{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:11px;font-family:inherit;color:var(--text);background:var(--bg);margin-top:6px;resize:none;min-height:28px}
.obs-field::placeholder{color:var(--text-light)}
.weight-delta{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;margin-left:6px}
.weight-prev{font-size:10px;color:var(--text-light);margin-left:4px}

.date-picker-row{display:flex;align-items:center;gap:8px;margin:8px 0 12px;padding:8px 12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.date-picker-row label{font-size:12px;font-weight:600;color:var(--text-med);white-space:nowrap}
.date-picker-row input[type=date]{flex:1;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg)}
.img-modal-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:pointer}
.img-modal-overlay img{max-width:92vw;max-height:85vh;border-radius:12px;object-fit:contain}
.card-img{cursor:pointer}
.diff-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.diff-btn{border:none;border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;opacity:.5;transition:all .2s}
.diff-btn.active{opacity:1;color:#fff}
.diff-btn:nth-child(2){background:#4CAF50}
.diff-btn:nth-child(3){background:#FFC107;color:#333!important}
.diff-btn:nth-child(4){background:#F44336}
.aero-type-row{display:flex;gap:6px;margin:8px 0}
.aero-type-btn{border:2px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);transition:all .2s;flex:1;text-align:center}
.aero-type-btn.active{color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<div id="flash-overlay" class="flash-overlay"></div>
<div id="floating-timer" style="display:none"></div>

// ===== COMPREHENSIVE DATA MIGRATION =====
(function(){
  var d=S.data,migrated=false;

  // Track data version
  var DATA_VERSION=3;
  if((d._version||0)<DATA_VERSION){

    // --- Migrate old series keys (sets_exId_YYYY-MM-DD → sets_exId) ---
    for(var k in d){
      if(k.match(/^sets_.*_\d{4}-\d{2}-\d{2}$/)){
        var parts=k.split("_");parts.pop();var newKey=parts.join("_");
        if(!d[newKey])d[newKey]=[];
        if(Array.isArray(d[k])){for(var i=0;i<d[k].length;i++){d[newKey].push(d[k][i])}}
        delete d[k];migrated=true;
      }
    }

    // --- Migrate renamed exercise IDs ---
    var exMigrations={
      "seated_row":"sup_pulldown",
      "hammer_row":"machine_row",
      "pullover":"face_pull"
    };
    for(var oldId in exMigrations){
      var newId=exMigrations[oldId];
      // Migrate weight history
      if(d[oldId]&&d[oldId].length>0){
        if(!d[newId])d[newId]=[];
        for(var i=0;i<d[oldId].length;i++){
          var exists=false;
          for(var j=0;j<d[newId].length;j++){if(d[newId][j].date===d[oldId][i].date){exists=true;break}}
          if(!exists)d[newId].push(d[oldId][i]);
        }
        migrated=true;
      }
      // Migrate sets, diff, obs prefixed keys
      var prefixes=["sets_","diff_","obs_"];
      for(var p=0;p<prefixes.length;p++){
        var okk=prefixes[p]+oldId,nkk=prefixes[p]+newId;
        if(d[okk]&&d[okk].length>0){
          if(!d[nkk])d[nkk]=[];
          for(var i=0;i<d[okk].length;i++){d[nkk].push(d[okk][i])}
          migrated=true;
        }
      }
    }

    // --- Migrate aero keys (old day-based → new ficha-based) ---
    var aeroMigrations={"aero_ter":"aero_a","aero_qui":"aero_b","aero_sab":"aero_c"};
    for(var oKey in aeroMigrations){
      var nKey=aeroMigrations[oKey];
      if(d[oKey]&&d[oKey].length>0){
        if(!d[nKey])d[nKey]=[];
        for(var i=0;i<d[oKey].length;i++){
          var exists=false;
          for(var j=0;j<d[nKey].length;j++){if(d[nKey][j].date===d[oKey][i].date){exists=true;break}}
          if(!exists)d[nKey].push(d[oKey][i]);
        }
        migrated=true;
      }
    }
    // Merge legacy aero into "atividade"
    var legacyAeroKeys=["tennis_mon","tennis_fri","run_wed","free_sun"];
    for(var la=0;la<legacyAeroKeys.length;la++){
      var lk=legacyAeroKeys[la];
      if(d[lk]&&d[lk].length>0){
        if(!d["atividade"])d["atividade"]=[];
        for(var i=0;i<d[lk].length;i++){
          var exists=false;
          for(var j=0;j<d["atividade"].length;j++){if(d["atividade"][j].date===d[lk][i].date){exists=true;break}}
          if(!exists){
            var entry=JSON.parse(JSON.stringify(d[lk][i]));
            if(!entry.tipo){
              if(lk.indexOf("tennis")>=0)entry.tipo="tenis";
              else if(lk.indexOf("run")>=0)entry.tipo="corrida";
              else entry.tipo="misto";
            }
            d["atividade"].push(entry);
          }
        }
        migrated=true;
      }
    }

    // --- Migrate snapshot exercise IDs ---
    if(d._snapshots){
      for(var si=0;si<d._snapshots.length;si++){
        var snap=d._snapshots[si];
        if(snap.exercises){
          for(var oldE in exMigrations){
            if(snap.exercises[oldE]!==undefined&&snap.exercises[exMigrations[oldE]]===undefined){
              snap.exercises[exMigrations[oldE]]=snap.exercises[oldE];
              migrated=true;
            }
          }
        }
      }
    }

    d._version=DATA_VERSION;
    migrated=true;
  }

  if(migrated){S.data=d;save(d)}
})();

// ===== TIMER (timestamp-based for background support) =====
var TIMER={active:null,activeName:"",endTime:0,remaining:0,interval:null,flashInterval:null,fired:false};
var audioCtx=null;var wakeLock=null;
function getAudioCtx(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return audioCtx}

// Request notification permission on first interaction
document.addEventListener("click",function reqNotif(){
  if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();
  document.removeEventListener("click",reqNotif);
},{once:true});

// Wake Lock to keep screen on during timer
async function requestWakeLock(){try{if("wakeLock" in navigator){wakeLock=await navigator.wakeLock.request("screen")}}catch(e){}}
function releaseWakeLock(){if(wakeLock){wakeLock.release().catch(function(){});wakeLock=null}}

function beep(){
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200,100,400]);
  var ov=document.getElementById("flash-overlay");
  if(ov){ov.classList.add("active");setTimeout(function(){ov.classList.remove("active")},2500)}
  // Try notification for background alert
  if("Notification" in window&&Notification.permission==="granted"){
    try{new Notification("Tempo esgotado!",{body:TIMER.activeName+" — hora da proxima serie",icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>",tag:"treino-timer",requireInteraction:true})}catch(e){}
  }
  var ctx=getAudioCtx();if(!ctx)return;
  function playTone(freq,delay,dur){setTimeout(function(){try{var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="square";o.frequency.value=freq;g.gain.value=0.35;o.start();setTimeout(function(){o.stop()},dur)}catch(e){}},delay)}
  playTone(880,0,200);playTone(1100,300,200);playTone(880,600,200);playTone(1100,900,300);
}
function updateFloatingTimer(){
  var ft=document.getElementById("floating-timer");
  if(!ft)return;
  if(!TIMER.active){ft.style.display="none";return}
  ft.style.display="flex";
  var m=Math.floor(TIMER.remaining/60);var s=TIMER.remaining%60;
  var timeStr=m+":"+(s<10?"0":"")+s;
  var isFlash=TIMER.remaining<=0&&TIMER.flashInterval;
  ft.innerHTML='<div class="floating-timer"><span class="ft-name">'+TIMER.activeName+'</span><span class="ft-time'+(isFlash?" flash":"")+'">'+timeStr+'</span><button class="ft-stop" onclick="stopTimer();render()">Parar</button></div>';
}
function timerTick(){
  var now=Date.now();
  TIMER.remaining=Math.max(0,Math.ceil((TIMER.endTime-now)/1000));
  if(TIMER.remaining<=0&&!TIMER.fired){
    TIMER.fired=true;
    clearInterval(TIMER.interval);TIMER.interval=null;
    releaseWakeLock();
    beep();
    TIMER.flashInterval=setInterval(function(){updateTimerUI();updateFloatingTimer()},100);
    setTimeout(function(){stopTimer();render()},3000);
  }
  updateTimerUI();updateFloatingTimer();
}
function startTimer(exId,seconds,exName){
  stopTimer();
  TIMER.active=exId;TIMER.activeName=exName||exId;TIMER.fired=false;
  TIMER.endTime=Date.now()+seconds*1000;
  TIMER.remaining=seconds;
  requestWakeLock();
  // Resume audio context (needed for mobile after user gesture)
  var ctx=getAudioCtx();if(ctx&&ctx.state==="suspended")ctx.resume();
  updateTimerUI();updateFloatingTimer();
  TIMER.interval=setInterval(timerTick,250);
}
function stopTimer(){
  if(TIMER.interval){clearInterval(TIMER.interval);TIMER.interval=null}
  if(TIMER.flashInterval){clearInterval(TIMER.flashInterval);TIMER.flashInterval=null}
  TIMER.active=null;TIMER.activeName="";TIMER.remaining=0;TIMER.fired=false;
  releaseWakeLock();
  updateFloatingTimer();
}
// Re-check timer when app comes back to foreground
document.addEventListener("visibilitychange",function(){
  if(!document.hidden&&TIMER.active){
    // Resume audio context
    var ctx=getAudioCtx();if(ctx&&ctx.state==="suspended")ctx.resume();
    if(TIMER.interval){timerTick()}
    else if(!TIMER.fired){
      var now=Date.now();TIMER.remaining=Math.max(0,Math.ceil((TIMER.endTime-now)/1000));
      if(TIMER.remaining<=0){TIMER.fired=true;beep();TIMER.flashInterval=setInterval(function(){updateTimerUI();updateFloatingTimer()},100);setTimeout(function(){stopTimer();render()},3000)}
      else{TIMER.interval=setInterval(timerTick,250);requestWakeLock()}
    }
    updateFloatingTimer();
  }
});
function updateTimerUI(){
  var el=document.getElementById("timer-"+TIMER.active);
  if(!el)return;
  var m=Math.floor(TIMER.remaining/60);var s=TIMER.remaining%60;
  el.textContent=m+":"+(s<10?"0":"")+s;
  if(TIMER.remaining<=0&&TIMER.flashInterval){el.classList.add("flash")}else{el.classList.remove("flash")}
  var btn=document.getElementById("tbtn-"+TIMER.active);
  if(btn){
    if(TIMER.remaining>0){btn.textContent="\u23F9"}
    else if(TIMER.remaining<=0&&TIMER.flashInterval){btn.textContent="\u2705"}
  }
}
function toggleTimer(exId,seconds,totalSets,exName){
  if(TIMER.active===exId){stopTimer();render();return}
  // Auto-increment series count
  var doneSets=getCompletedSets(exId);
  if(doneSets<totalSets){
    var k=getSeriesKey(exId);
    if(!S.data[k])S.data[k]=[];
    var idx=-1;

var SYNC_KEY="treino_sync_url";
var SYNC_DEFAULT="https://script.google.com/macros/s/AKfycbyf_WkziaTsIh5zgk0-Apc8x86a8lNBDm5H1Hx8Y7BfHfgoM-R2zJ4re-aM_cRgxIfBJQ/exec";

// ===== AUTO-SYNC: every save pushes to cloud silently =====
var _origSave=save;
save=function(d){
  var ok=_origSave(d);
  var url=getSyncUrl();
  if(ok&&url){
    try{fetch(url,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).catch(function(){})}catch(e){}
  }
  return ok;
};
function doSyncPush(){
  var url=getSyncUrl();
  if(!url){flash("Configure a URL de sync primeiro");return}
  flash("\u2B06 Enviando...");
  fetch(url,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(S.data)})
  .then(function(r){return r.json()})
  .then(function(d){flash(d.ok?"\u2713 Dados enviados!":"\u2717 Erro: "+(d.error||""))})
  .catch(function(e){flash("\u2717 Falha: "+e.message)});
}
function doSyncPull(){
  var url=getSyncUrl();
  if(!url){flash("Configure a URL de sync primeiro");return}
  flash("\u2B07 Recebendo...");
  fetch(url,{mode:"cors"})
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.data){
      var merged=clone(S.data);
      for(var k in d.data){merged[k]=d.data[k]}
      S.data=merged;save(merged);
      flash("\u2713 Dados recebidos e mesclados!");render();
    }else{flash("\u2717 Erro: "+(d.error||"sem dados"))}
  })
  .catch(function(e){flash("\u2717 Falha: "+e.message)});
}

// ===== AUTO-SYNC: Domingo 23:30 =====
var AUTO_SYNC_KEY="last_auto_sync";
function checkAutoSync(){
  var now=new Date();
  if(now.getDay()===0&&now.getHours()===23&&now.getMinutes()>=30&&now.getMinutes()<=35){
    var lastSync=localStorage.getItem(AUTO_SYNC_KEY)||"";
    var todayKey=todayStr();
    if(lastSync!==todayKey){
      localStorage.setItem(AUTO_SYNC_KEY,todayKey);
      saveWeeklySnapshot();
      var url=getSyncUrl();
      if(url){
        fetch(url,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(S.data)})
        .then(function(){flash("\u2713 Auto-sync semanal realizado!")})
        .catch(function(){});
      }
    }
  }
}
function saveWeeklySnapshot(){
  var dates=getWeekDates(0);
  var totals=getWeekTotals(dates);
  var monday=getMonday(todayStr());
  var snap={
    week:monday,dates:dates,
    sessions:totals.sessions,kcal:totals.totalKcal,
    dist:totals.totalDist,mins:totals.totalMins,
    exercises:{}
  };
  var gymKeys=["A","B","C"];
  for(var gk=0;gk<gymKeys.length;gk++){
    var wk=GYM[gymKeys[gk]];
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];
      for(var ei=0;ei<g.exercises.length;ei++){
        var ex=g.exercises[ei],entries=S.data[ex.id]||[];
        for(var k=0;k<entries.length;k++){
          if(dates.indexOf(entries[k].date)>=0){snap.exercises[ex.id]=entries[k].weight;break}
        }
      }
    }
  }
  if(!S.data._snapshots)S.data._snapshots=[];
  var exists=false;
  for(var i=0;i<S.data._snapshots.length;i++){if(S.data._snapshots[i].week===monday){S.data._snapshots[i]=snap;exists=true;break}}
  if(!exists)S.data._snapshots.push(snap);
  if(S.data._snapshots.length>52)S.data._snapshots=S.data._snapshots.slice(-52);
  save(S.data);
}

// === REPORT ===
function getMonday(d){var dt=new Date(d+"T00:00:00");var day=dt.getDay();var diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0")}
function addDays(ds,n){var d=new Date(ds+"T00:00:00");d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function getWeekDates(off){var now=new Date();now.setDate(now.getDate()+off*7);var mon=getMonday(now.toISOString().slice(0,10));return [0,1,2,3,4,5,6].map(function(i){return addDays(mon,i)})}

function getWeekTotals(dates){
  var totalKcal=0,totalMins=0,totalDist=0,gymDays={},aeroDays={};
  // Scan all gym exercises across all fichas
  var gymKeys=["A","B","C"];
  for(var gk=0;gk<gymKeys.length;gk++){
    var wk=GYM[gymKeys[gk]];
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];
      for(var ei=0;ei<g.exercises.length;ei++){
        var entries=S.data[g.exercises[ei].id]||[];
        for(var k=0;k<entries.length;k++){if(dates.indexOf(entries[k].date)>=0)gymDays[entries[k].date]=true}
      }
    }
  }
  // Scan aero data
  var aeroKeys=["aero_a","aero_b","aero_c","atividade"];
  for(var ai=0;ai<aeroKeys.length;ai++){
    var entries=S.data[aeroKeys[ai]]||[];
    for(var k=0;k<entries.length;k++){
      if(dates.indexOf(entries[k].date)>=0){
        aeroDays[entries[k].date]=true;
        totalKcal+=(entries[k].kcal||0);totalMins+=(entries[k].mins||0);totalDist+=(entries[k].dist||0);
      }
    }
  }
  // Also check legacy aero keys
  var legacyAero=["tennis_mon","run_wed","tennis_fri","free_sun","aero_ter","aero_qui","aero_sab"];
  for(var li=0;li<legacyAero.length;li++){
    var entries=S.data[legacyAero[li]]||[];
    for(var k=0;k<entries.length;k++){
      if(dates.indexOf(entries[k].date)>=0){
        aeroDays[entries[k].date]=true;
        totalKcal+=(entries[k].kcal||0);totalMins+=(entries[k].mins||0);totalDist+=(entries[k].dist||0);
      }
    }
  }
  var allDays={};for(var d in gymDays)allDays[d]=true;for(var d in aeroDays)allDays[d]=true;
  var sessions=Object.keys(allDays).length;
  return {totalKcal:totalKcal,totalMins:totalMins,totalDist:Math.round(totalDist*10)/10,sessions:sessions};
}

function getExerciseHistory(exId,num){
  var entries=S.data[exId]||[];var weeks={};
  for(var i=0;i<entries.length;i++){var mon=getMonday(entries[i].date);if(!weeks[mon]||entries[i].weight>weeks[mon])weeks[mon]=entries[i].weight}
  var allW=Object.keys(weeks).sort().slice(-num);
  return allW.map(function(w){return {week:w,weight:weeks[w]}});
}

function getWeekVolume(dates){
  var totalVol=0,exCount=0;
  var gymKeys=["A","B","C"];
  for(var gk=0;gk<gymKeys.length;gk++){
    var wk=GYM[gymKeys[gk]];
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];
      for(var ei=0;ei<g.exercises.length;ei++){
        var ex=g.exercises[ei],entries=S.data[ex.id]||[];
        var sets=parseInt(ex.series)||3,reps=parseInt((ex.series.match(/\u00d7(\d+)/)||["","12"])[1])||12;
        for(var k=0;k<entries.length;k++){
          if(dates.indexOf(entries[k].date)>=0){
            totalVol+=entries[k].weight*sets*reps;
            exCount++;break;
          }
        }
      }
    }
  }
  return {volume:Math.round(totalVol),exercises:exCount};
}

function getHistoricalAverages(excludeWeek){
  var snaps=S.data._snapshots||[];
  var filtered=[];
  for(var i=0;i<snaps.length;i++){if(snaps[i].week!==excludeWeek)filtered.push(snaps[i])}
  if(filtered.length===0)return null;
  var avg={sessions:0,kcal:0,dist:0,mins:0,exercises:{},weeks:filtered.length};
  for(var i=0;i<filtered.length;i++){
    avg.sessions+=filtered[i].sessions||0;
    avg.kcal+=filtered[i].kcal||0;
    avg.dist+=filtered[i].dist||0;
    avg.mins+=filtered[i].mins||0;
    var exs=filtered[i].exercises||{};
    for(var eid in exs){
      if(!avg.exercises[eid])avg.exercises[eid]={sum:0,count:0};
      avg.exercises[eid].sum+=exs[eid];avg.exercises[eid].count++;
    }
  }
  var n=filtered.length;
  avg.sessions=Math.round(avg.sessions/n*10)/10;
  avg.kcal=Math.round(avg.kcal/n);
  avg.dist=Math.round(avg.dist/n*10)/10;
  avg.mins=Math.round(avg.mins/n);
  for(var eid in avg.exercises){avg.exercises[eid]=Math.round(avg.exercises[eid].sum/avg.exercises[eid].count*10)/10}
  return avg;
}

        var avgNote="";
        if(avg&&avg.exercises&&avg.exercises[ex.id]){
          var avgW=avg.exercises[ex.id];
          var curW=hist[hist.length-1].weight;
          var diffW=Math.round((curW-avgW)*10)/10;
          if(diffW!==0){
            var avgDc=diffW>0?"var(--green)":"var(--orange)";var avgDs=diffW>0?"+":"";
            avgNote='<span style="color:'+avgDc+';font-size:10px"> ('+avgDs+diffW+'kg vs media '+avgW+'kg)</span>';
          }else{avgNote='<span style="font-size:10px;color:var(--text-light)"> (= media '+avgW+'kg)</span>'}
        }
        h+='<div class="prog-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap">';
        h+='<div class="prog-name">'+ex.name+avgNote+'</div>'+deltaH+'</div>';
        h+='<div class="prog-bars" style="margin-bottom:14px">';
        for(var k=0;k<hist.length;k++){
          var pct=maxW>0?Math.max(8,(hist[k].weight/maxW)*100):8;
          var isLast=k===hist.length-1;
          var barC=isLast?wk.color:"#ccc";
          h+='<div class="prog-bar" style="height:'+pct+'%;background:'+barC+'">';
          h+='<div class="pb-val" style="color:'+(isLast?wk.color:"var(--text-light)")+'">'+hist[k].weight+'</div>';
          h+='<div class="pb-wk">'+fmtD(hist[k].week)+'</div></div>';
        }
        h+='</div></div>';
      }}
    }
  }

  h+='<button class="share-btn" onclick="exportReportText()">Copiar Relatorio como Texto</button>';
  if(!hasEx)h+='<div class="no-data">Registre seus treinos para ver o relatorio de progressao.</div>';
  h+='</div></div>';
  document.getElementById("app").insertAdjacentHTML("beforeend",h);
}

function exportReportText(){
  var dates=getWeekDates(R.weekOffset),totals=getWeekTotals(dates);
  var txt="RELATORIO SEMANAL\n"+fmtD(dates[0])+" - "+fmtD(dates[6])+"\n";
  txt+="Sessoes: "+totals.sessions+"/7\nKcal: "+totals.totalKcal+"\nDistancia: "+totals.totalDist+"km\nTempo: "+totals.totalMins+"min\n\n";
  for(var gk=0;gk<["A","B","C"].length;gk++){
    var key=["A","B","C"][gk],wk=GYM[key];
    txt+=wk.title+" ("+wk.day+")\n";
    for(var gi=0;gi<wk.groups.length;gi++){var g=wk.groups[gi];for(var ei=0;ei<g.exercises.length;ei++){
      var ex=g.exercises[ei],entries=S.data[ex.id]||[];
      for(var k=0;k<entries.length;k++){if(dates.indexOf(entries[k].date)>=0){txt+="  "+ex.name+": "+entries[k].weight+"kg\n";break}}
    }}txt+="\n";
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(function(){flash("\u2713 Copiado!")}).catch(function(){prompt("Copie:",txt)});
  else prompt("Copie:",txt);
}

render();
</script></body></html>
