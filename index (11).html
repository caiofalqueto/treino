<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4332">
<title>Registro de Treino</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<style>
  :root {
    --green:#2D6A4F; --green-light:#E8F5E9; --green-dark:#1B4332;
    --blue:#264653; --blue-light:#E3EFF3;
    --orange:#C65D3E; --orange-light:#FFF0EB;
    --purple:#7B2D8E; --purple-light:#F3E5F5;
    --teal:#00796B; --teal-light:#E0F2F1;
    --text:#1A1A1A; --text-med:#555; --text-light:#999;
    --bg:#F5F5F5; --card:#fff; --border:#E0E0E0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100dvh;padding-bottom:90px;-webkit-font-smoothing:antialiased}
  .header{background:var(--green-dark);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
  .header h1{color:#fff;font-size:13px;font-weight:700;letter-spacing:1.5px}
  .header-r{display:flex;align-items:center;gap:10px}
  .header .date{color:rgba(255,255,255,.75);font-size:12px}
  .btn-set{background:rgba(255,255,255,.15);border:none;border-radius:6px;padding:5px 9px;color:#fff;font-size:14px;cursor:pointer}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:47px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;min-width:0;width:calc(100%/7);border:none;padding:8px 4px 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:0;font-family:inherit;transition:all .2s;background:transparent}
  .tab .icon{font-size:14px;line-height:1}
  .tab .day{font-size:9px;font-weight:700;letter-spacing:.5px}
  .tab .label{font-size:8px;opacity:.7;line-height:1}
  .tab.active{color:#fff}
  .wk-title{text-align:center;font-size:13px;font-weight:600;padding:10px 16px 4px;letter-spacing:.3px}
  .content{padding:0 10px}
  .gh{font-size:11px;font-weight:700;padding:6px 10px;margin-top:10px;margin-bottom:5px;border-radius:6px;border-left:3px solid;letter-spacing:.8px;text-transform:uppercase}
  .card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card-main{display:flex;gap:10px;align-items:flex-start}
  .card-img{width:68px;height:68px;border-radius:8px;flex-shrink:0;object-fit:cover;background:#F8F9FA;border:1px solid #eee}
  .card-body{flex:1;min-width:0}
  .ex-name{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:2px}
  .ex-subs{font-size:10px;color:var(--green);margin-bottom:4px;line-height:1.3}
  .ex-subs i{font-weight:500;color:var(--text-light)}
  .ex-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
  .pause{font-size:10px;color:var(--text-light)}
  .tips{margin-top:4px}
  .tip{font-size:11px;color:var(--text-med);line-height:1.4;padding:2px 0 2px 10px;position:relative}
  .tip::before{content:"•";position:absolute;left:0;color:var(--text-light)}
  .weight-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
  .weight-left{display:flex;align-items:center;gap:4px}
  .weight-label{font-size:11px;color:var(--text-light);font-weight:500}
  .w-input{width:62px;height:34px;border:2px solid var(--border);border-radius:8px;text-align:center;font-size:16px;font-weight:600;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
  .w-input:focus{border-color:var(--green)}
  .w-input::placeholder{color:#ccc;font-weight:400}
  .kg{font-size:11px;color:var(--text-light)}
  .last-btn{font-size:10px;color:#888;background:none;border:none;padding:2px 0;cursor:pointer;font-family:inherit}
  .prog-up{color:var(--green);font-weight:600}
  .prog-down{color:var(--orange);font-weight:600}
  .history{margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:6px;border-top:1px solid var(--border)}
  .hist-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
  .hist-grid{display:flex;flex-wrap:wrap;gap:4px}
  .hist-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;background:var(--card);border-radius:4px;font-size:11px}
  .hist-date{color:var(--text-light);font-size:10px}
  .hist-w{font-weight:600}
  .hist-d{font-size:10px;font-weight:600}
  .save-btn{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:480px;padding:15px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;border:none;border-radius:14px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);transition:opacity .2s;z-index:30}
  .save-btn:active{opacity:.8}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:100;box-shadow:0 4px 14px rgba(0,0,0,.25);animation:fadeIn .2s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
  .settings{padding:14px 16px;background:#EFEFEF;border-bottom:1px solid var(--border)}
  .set-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .set-btns{display:flex;gap:6px;flex-wrap:wrap}
  .set-btn{border:none;border-radius:8px;padding:9px 14px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .set-btn:active{opacity:.8}
  .import-area{width:100%;height:56px;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:11px;font-family:monospace;resize:none;margin-top:6px}
  .settings .hint{font-size:10px;color:var(--text-light);margin-top:8px;line-height:1.4}
  .danger{background:#999!important;margin-top:6px}
  .danger.confirm{background:#d32f2f!important}
  /* Aero cards */
  .aero-hero{text-align:center;padding:20px 16px 10px}
  .aero-emoji{font-size:48px;margin-bottom:6px}
  .aero-desc{font-size:12px;color:var(--text-light);margin-top:4px}
  .aero-card{background:var(--card);border-radius:12px;padding:16px;margin:8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .aero-card label{font-size:12px;font-weight:600;color:var(--text-med);display:block;margin-bottom:6px}
  .aero-fields{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .aero-field{display:flex;flex-direction:column;gap:4px}
  .aero-field span{font-size:10px;color:var(--text-light);font-weight:500}
  .aero-input{width:80px;height:40px;border:2px solid var(--border);border-radius:10px;text-align:center;font-size:18px;font-weight:600;color:var(--text);background:var(--bg);outline:none;font-family:inherit;-webkit-appearance:none;-moz-appearance:textfield}
  .aero-input:focus{border-color:var(--green)}
  .aero-input.wide{width:100%;text-align:left;padding:0 12px;font-size:14px;font-weight:500}
  .aero-input::placeholder{color:#ccc;font-weight:400;font-size:13px}
  .aero-unit{font-size:12px;color:var(--text-light);align-self:center;padding-bottom:8px}
  .aero-hist{margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}
  .aero-hist-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .aero-hist-grid{display:flex;flex-direction:column;gap:4px}
  .aero-hist-row{display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--bg);border-radius:6px;font-size:11px}
  .aero-hist-row .date{color:var(--text-light);min-width:38px}
  .aero-hist-row .val{font-weight:600;color:var(--text)}
  .aero-hist-row .act{color:var(--text-med);font-style:italic}

  /* Report overlay */
  .report-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:30px}
  .report-header{background:var(--green-dark);padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:210}
  .report-header h2{color:#fff;font-size:14px;font-weight:700;letter-spacing:1px}
  .btn-close{background:rgba(255,255,255,.2);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
  .report-content{padding:12px}
  .week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0}
  .week-nav button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .week-nav button:disabled{opacity:.3;cursor:default}
  .week-nav .week-label{font-size:13px;font-weight:600;color:var(--text);min-width:160px;text-align:center}
  .section-title{font-size:13px;font-weight:700;color:var(--green-dark);margin:16px 0 8px;padding-left:4px;letter-spacing:.5px;text-transform:uppercase}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
  .day-cell{background:var(--card);border-radius:8px;padding:8px 4px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .day-cell .dc-day{font-size:9px;font-weight:700;color:var(--text-light);letter-spacing:.5px}
  .day-cell .dc-icon{font-size:18px;margin:4px 0}
  .day-cell .dc-status{font-size:8px;font-weight:600}
  .day-cell.done{border:2px solid var(--green)}
  .day-cell.missed{opacity:.5}
  .summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .sum-card{background:var(--card);border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .sum-card .val{font-size:22px;font-weight:700;line-height:1.2}
  .sum-card .lbl{font-size:10px;color:var(--text-light);font-weight:500;margin-top:2px}
  .sum-card .delta{font-size:11px;font-weight:600;margin-top:4px}
  .prog-card{background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:6px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .prog-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
  .prog-bars{display:flex;align-items:flex-end;gap:3px;height:40px}
  .prog-bar{flex:1;border-radius:3px 3px 0 0;min-width:0;position:relative;transition:height .3s}
  .prog-bar .pb-val{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600;white-space:nowrap}
  .prog-bar .pb-wk{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);font-size:7px;color:var(--text-light)}
  .prog-legend{display:flex;gap:12px;justify-content:center;margin:6px 0 10px}
  .prog-legend span{font-size:10px;color:var(--text-light)}
  .aero-compare{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .aero-compare .ac-title{font-size:12px;font-weight:600;margin-bottom:8px}
  .ac-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .ac-row .ac-label{font-size:10px;color:var(--text-light);min-width:40px}
  .ac-row .ac-bar-bg{flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden}
  .ac-row .ac-bar{height:100%;border-radius:7px;transition:width .3s}
  .ac-row .ac-val{font-size:11px;font-weight:600;min-width:50px;text-align:right}
  .share-btn{width:100%;padding:14px;background:var(--green-dark);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px;letter-spacing:.5px}
  .share-btn:active{opacity:.8}
  .no-data{text-align:center;padding:30px;color:var(--text-light);font-size:13px}
</style>
</head>

  {key:"TER", icon:"🏋️", label:"Treino A", color:"#2D6A4F", light:"#E8F5E9", type:"gym",  gymKey:"TER"},
  {key:"QUA", icon:"🏃", label:"Corrida",  color:"#00796B", light:"#E0F2F1", type:"aero", aeroId:"run_wed", aeroName:"Corrida"},
  {key:"QUI", icon:"🏋️", label:"Treino B", color:"#264653", light:"#E3EFF3", type:"gym",  gymKey:"QUI"},

const SK="treino_full_v1";
const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const fmtD=d=>{const p=d.split("-");return `${p[2]}/${p[1]}`};
const clone=o=>JSON.parse(JSON.stringify(o));
function load(){try{const s=localStorage.getItem(SK);return s?JSON.parse(s):{}}catch{return {}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d));return true}catch{return false}}
function countE(d){let n=0;for(const k in d){const v=d[k];n+=Array.isArray(v)?v.length:0}return n}

let S={tab:"SEG",data:load(),wts:{},aero:{},hist:null,sets:false,imp:false,toast:null,clr:false};

// Auto-select today's tab
const dayIdx=new Date().getDay(); // 0=Sun
const dayMap={0:"DOM",1:"SEG",2:"TER",3:"QUA",4:"QUI",5:"SEX",6:"SAB"};
S.tab=dayMap[dayIdx]||"SEG";

function flash(m){S.toast=m;render();setTimeout(()=>{S.toast=null;render()},2500)}
function getLast(id){const e=S.data[id];return e&&e.length?e[e.length-1]:null}
function getHist(id){return(S.data[id]||[]).slice(-10)}
function getProg(id){const e=S.data[id]||[];if(e.length<2)return null;const l=e[e.length-1].weight,p=e[e.length-2].weight;return l>p?"up":l<p?"down":"same"}

function doSaveGym(){
  const t=today(),tabObj=TABS.find(x=>x.key===S.tab),wk=GYM[tabObj.gymKey];
  const nd=clone(S.data);let any=false;
  for(const g of wk.groups)for(const ex of g.exercises){
    const v=S.wts[ex.id];if(v&&parseFloat(v)>0){
      any=true;if(!nd[ex.id])nd[ex.id]=[];
      const w=parseFloat(v),idx=nd[ex.id].findIndex(e=>e.date===t);
      if(idx>=0)nd[ex.id][idx]={date:t,weight:w};else nd[ex.id].push({date:t,weight:w});
    }
  }
  if(!any){flash("Preencha pelo menos um peso");return}
  S.data=nd;const ok=save(nd);S.wts={};flash(ok?"✓ Treino salvo!":"Erro ao salvar");
}

function doSaveAero(){
  const t=today(),tabObj=TABS.find(x=>x.key===S.tab);
  const id=tabObj.aeroId;
  const kcal=S.aero.kcal, mins=S.aero.mins, act=S.aero.act||"";
  if((!kcal||parseFloat(kcal)<=0)&&(!mins||parseFloat(mins)<=0)){flash("Preencha kcal ou tempo");return}
  const nd=clone(S.data);
  if(!nd[id])nd[id]=[];
  const entry={date:t};
  if(kcal&&parseFloat(kcal)>0)entry.kcal=parseFloat(kcal);
  if(mins&&parseFloat(mins)>0)entry.mins=parseFloat(mins);
  if(act)entry.act=act;
  const idx=nd[id].findIndex(e=>e.date===t);
  if(idx>=0)nd[id][idx]=entry;else nd[id].push(entry);
  S.data=nd;const ok=save(nd);S.aero={};flash(ok?"✓ Atividade salva!":"Erro ao salvar");
}

function doExport(){
  const enc=btoa(unescape(encodeURIComponent(JSON.stringify(S.data))));
  if(navigator.clipboard&&navigator.clipboard.writeText)
    navigator.clipboard.writeText(enc).then(()=>flash("✓ Dados copiados!")).catch(()=>prompt("Copie:",enc));
  else prompt("Copie:",enc);
}
function doImport(){
  const a=document.getElementById("imp-area");if(!a||!a.value.trim()){flash("Cole o código");return}
  try{const p=JSON.parse(decodeURIComponent(escape(atob(a.value.trim()))));S.data=p;save(p);S.imp=false;S.sets=false;flash("✓ Importado!")}catch{flash("Código inválido")}
}
function doClear(){if(!S.clr){S.clr=true;render();return}S.data={};S.wts={};S.aero={};save({});S.clr=false;S.sets=false;flash("Dados apagados")}

function renderAero(tabObj, isFree){
  const c=tabObj.color, id=tabObj.aeroId;
  const hist=(S.data[id]||[]).slice(-8);
  const emoji=tabObj.icon;
  const name=isFree?"Atividade Livre":tabObj.aeroName;

  let h=`<div class="aero-hero"><div class="aero-emoji">${emoji}</div>
    <div class="wk-title" style="color:${c};padding:0">${name}</div>
    <div class="aero-desc">${isFree?"Registre qualquer atividade aeróbica":"Registre sua sessão de hoje"}</div></div>`;

  h+=`<div class="aero-card">`;
  if(isFree){
    h+=`<label>Atividade</label>
      <input type="text" class="aero-input wide" placeholder="Ex: Caminhada, Bike, Natação..."
        value="${S.aero.act||""}" oninput="S.aero.act=this.value"
        style="${S.aero.act?`border-color:${c}`:""}""><br><br>`;
  }
  h+=`<div class="aero-fields">
    <div class="aero-field"><span>Calorias</span>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" inputmode="decimal" class="aero-input" placeholder="—"
          value="${S.aero.kcal||""}" oninput="S.aero.kcal=this.value"
          style="${S.aero.kcal?`border-color:${c}`:""}">
        <span class="aero-unit">kcal</span>
      </div>
    </div>
    <div class="aero-field"><span>Duração</span>
      <div style="display:flex;align-items:center;gap:4px">
        <input type="number" inputmode="numeric" class="aero-input" placeholder="—"
          value="${S.aero.mins||""}" oninput="S.aero.mins=this.value"
          style="${S.aero.mins?`border-color:${c}`:""}">
        <span class="aero-unit">min</span>
      </div>
    </div>
  </div>`;

  if(hist.length>0){
    h+=`<div class="aero-hist"><div class="aero-hist-title">Histórico</div><div class="aero-hist-grid">`;
    hist.slice().reverse().forEach(e=>{
      let vals=[];
      if(e.kcal)vals.push(`${e.kcal} kcal`);
      if(e.mins)vals.push(`${e.mins} min`);
      h+=`<div class="aero-hist-row">
        <span class="date">${fmtD(e.date)}</span>
        <span class="val">${vals.join(" · ")}</span>
        ${e.act?`<span class="act">${e.act}</span>`:""}
      </div>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;
  return h;
}

function render(){
  const tabObj=TABS.find(x=>x.key===S.tab);
  const c=tabObj.color, n=countE(S.data);

  let h=`<div class="header"><h1>🏋️ REGISTRO SEMANAL</h1>
    <div class="header-r"><span class="date">${fmtD(today())}</span>
    <button class="btn-set" onclick="R.open=true;R.weekOffset=0;render();renderReport()" style="font-size:12px">📊</button>
    <button class="btn-set" onclick="S.sets=!S.sets;S.clr=false;render()">⚙</button></div></div>`;

  if(S.sets){
    h+=`<div class="settings"><div class="set-row"><span style="font-size:12px;color:var(--text-med)">🟢 localStorage ativo</span>
    <span style="font-size:11px;color:var(--text-light)">• ${n} registros</span></div>
    <div class="set-btns">
      <button class="set-btn" style="background:var(--green)" onclick="doExport()">📤 Exportar</button>
      <button class="set-btn" style="background:var(--blue)" onclick="S.imp=!S.imp;render()">📥 Importar</button>
      <button class="set-btn danger ${S.clr?'confirm':''}" onclick="doClear()">${S.clr?"⚠ Confirmar":"🗑 Limpar"}</button>
    </div>`;
    if(S.imp)h+=`<textarea id="imp-area" class="import-area" placeholder="Cole o código exportado"></textarea>
      <button class="set-btn" style="background:var(--orange);width:100%;margin-top:4px" onclick="doImport()">Importar</button>`;
    h+=`<div class="hint">Exporte para backup. Importe para restaurar em outro dispositivo.</div></div>`;
  }

  // Tabs
  h+=`<div class="tabs">`;
  for(const tb of TABS){
    const act=S.tab===tb.key;
    h+=`<button class="tab ${act?"active":""}" style="${act?`background:${tb.color};color:#fff`:`color:#666`}"
      onclick="S.tab='${tb.key}';S.hist=null;S.wts={};S.aero={};render()">
      <span class="icon">${tb.icon}</span><span class="day">${tb.key}</span><span class="label">${tb.label}</span>
    </button>`;
  }
  h+=`</div>`;

  // Content based on type
  if(tabObj.type==="aero"){
    h+=renderAero(tabObj, false);
    h+=`<button class="save-btn" style="background:${c}" onclick="doSaveAero()">Salvar Atividade</button>`;
  } else if(tabObj.type==="free"){
    h+=renderAero(tabObj, true);
    h+=`<button class="save-btn" style="background:${c}" onclick="doSaveAero()">Salvar Atividade</button>`;
  } else {
    // Gym workout
    const wk=GYM[tabObj.gymKey];
    h+=`<div class="wk-title" style="color:${c}">${wk.title}</div><div class="content">`;
    for(const g of wk.groups){
      h+=`<div class="gh" style="background:${wk.light};border-left-color:${c}">${g.name}</div>`;
      for(const ex of g.exercises){
        const last=getLast(ex.id),prog=getProg(ex.id),hist=getHist(ex.id),isO=S.hist===ex.id;
        const cv=S.wts[ex.id]||"";
        h+=`<div class="card"><div class="card-main">
          <img class="card-img" src="${ex.img}" alt="${ex.name}">
          <div class="card-body"><div class="ex-name">${ex.name}</div>
            <div class="ex-subs"><i>Alt:</i> ${ex.subs}</div>
            <div class="ex-meta"><span class="badge" style="background:${wk.light};color:${c}">${ex.series}</span>
            <span class="pause">Pausa: ${ex.pause}</span></div>
            <div class="tips">`;
        for(const t of ex.tips)h+=`<div class="tip">${t}</div>`;
        h+=`</div></div></div>
          <div class="weight-row"><div class="weight-left">
            <span class="weight-label">Peso:</span>
            <input type="number" inputmode="decimal" step="0.5" min="0" class="w-input"
              placeholder="${last?last.weight:"—"}" value="${cv}"
              oninput="S.wts['${ex.id}']=this.value" style="${cv?`border-color:${c}`:""}">
            <span class="kg">kg</span></div>`;
        if(last){
          const pc=prog==="up"?"prog-up":prog==="down"?"prog-down":"";
          const ar=prog==="up"?"↑":prog==="down"?"↓":prog==="same"?"=":"";
          h+=`<button class="last-btn ${pc}" onclick="S.hist=S.hist==='${ex.id}'?null:'${ex.id}';render()">
            ${ar} Último: ${last.weight}kg <span style="font-size:9px;margin-left:2px">${isO?"▲":"▼"}</span></button>`;
        }
        h+=`</div>`;
        if(isO&&hist.length>0){
          h+=`<div class="history"><div class="hist-label">Histórico</div><div class="hist-grid">`;
          hist.forEach((hh,i)=>{
            let dh="";if(i>0){const dd=hh.weight-hist[i-1].weight;const dc=dd>0?"prog-up":dd<0?"prog-down":"";const dt=dd>0?`+${dd.toFixed(1)}`:dd<0?dd.toFixed(1):"=";dh=`<span class="hist-d ${dc}">${dt}</span>`}
            h+=`<div class="hist-chip"><span class="hist-date">${fmtD(hh.date)}</span><span class="hist-w">${hh.weight}kg</span>${dh}</div>`;
          });
          h+=`</div></div>`;
        }
        h+=`</div>`;
      }
    }
    h+=`</div><button class="save-btn" style="background:${c}" onclick="doSaveGym()">Salvar Treino</button>`;
  }

  if(S.toast)h+=`<div class="toast">${S.toast}</div>`;
  document.getElementById("app").innerHTML=h;
}

// === REPORT SYSTEM ===
let R = { open: false, weekOffset: 0 };

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getWeekDates(offset) {
  const now = new Date();
  now.setDate(now.getDate() + offset * 7);
  const mon = getMonday(now.toISOString().slice(0,10));
  return Array.from({length:7}, (_,i) => addDays(mon, i));
}

function getAllWeeks() {
  const allDates = new Set();
  for (const k in S.data) {
    const arr = S.data[k];
    if (Array.isArray(arr)) arr.forEach(e => { if(e.date) allDates.add(e.date); });
  }
  const weeks = new Set();
  allDates.forEach(d => weeks.add(getMonday(d)));
  return [...weeks].sort();
}

function getWeekData(dates) {
  const result = { gym: {}, aero: {}, days: {} };
  const tabMap = {};
  TABS.forEach(t => {
    const dayIdx = ["SEG","TER","QUA","QUI","SEX","SAB","DOM"].indexOf(t.key);
    tabMap[dayIdx] = t;
  });

  // Check each day
  dates.forEach((date, i) => {
    const tab = tabMap[i];
    if (!tab) return;
    let hasData = false;

    if (tab.type === "gym") {
      const wk = GYM[tab.gymKey];
      for (const g of wk.groups) {
        for (const ex of g.exercises) {
          const entries = S.data[ex.id] || [];
          const entry = entries.find(e => e.date === date);
          if (entry) {
            hasData = true;
            result.gym[ex.id] = result.gym[ex.id] || { name: ex.name, weight: entry.weight };
          }
        }
      }
    } else {
      const id = tab.aeroId;
      const entries = S.data[id] || [];
      const entry = entries.find(e => e.date === date);
      if (entry) {
        hasData = true;
        result.aero[id] = entry;
      }
    }
    result.days[i] = { date, tab, hasData };
  });
  return result;
}

function getExerciseHistory(exId, numWeeks) {
  const entries = S.data[exId] || [];
  const weeks = {};
  entries.forEach(e => {
    const mon = getMonday(e.date);
    if (!weeks[mon] || e.weight > weeks[mon]) weeks[mon] = e.weight;
  });
  const allW = Object.keys(weeks).sort().slice(-numWeeks);
  return allW.map(w => ({ week: w, weight: weeks[w] }));
}

function getAeroHistory(aeroId, numWeeks) {
  const entries = S.data[aeroId] || [];
  const weeks = {};
  entries.forEach(e => {
    const mon = getMonday(e.date);
    if (!weeks[mon]) weeks[mon] = { kcal: 0, mins: 0 };
    weeks[mon].kcal += (e.kcal || 0);
    weeks[mon].mins += (e.mins || 0);
  });
  const allW = Object.keys(weeks).sort().slice(-numWeeks);
  return allW.map(w => ({ week: w, ...weeks[w] }));
}

function getWeekTotals(dates) {
  let totalKcal = 0, totalMins = 0, sessions = 0;
  const tabMap = {};
  TABS.forEach(t => { tabMap[["SEG","TER","QUA","QUI","SEX","SAB","DOM"].indexOf(t.key)] = t; });

  dates.forEach((date, i) => {
    const tab = tabMap[i];
    if (!tab) return;
    if (tab.type === "gym") {
      const wk = GYM[tab.gymKey];
      let any = false;
      for (const g of wk.groups) for (const ex of g.exercises) {
        const e = (S.data[ex.id]||[]).find(x=>x.date===date);
        if (e) any = true;
      }
      if (any) sessions++;
    } else {
      const e = (S.data[tab.aeroId]||[]).find(x=>x.date===date);
      if (e) { sessions++; totalKcal += (e.kcal||0); totalMins += (e.mins||0); }
    }
  });
  return { totalKcal, totalMins, sessions };
}

function renderReport() {
  const dates = getWeekDates(R.weekOffset);
  const prevDates = getWeekDates(R.weekOffset - 1);
  const wd = getWeekData(dates);
  const totals = getWeekTotals(dates);
  const prevTotals = getWeekTotals(prevDates);
  const mon = dates[0], dom = dates[6];
  const allWeeks = getAllWeeks();
  const currentMon = getMonday(dates[0]);
  const hasOlder = allWeeks.length > 0 && allWeeks[0] < currentMon;
  const isCurrentWeek = R.weekOffset >= 0;

  let h = `<div class="report-overlay">
    <div class="report-header">
      <h2>📊 RELATÓRIO SEMANAL</h2>
      <button class="btn-close" onclick="R.open=false;render()">✕ Fechar</button>
    </div>
    <div class="report-content">`;

  // Week nav
  h += `<div class="week-nav">
    <button onclick="R.weekOffset--;renderReport()" ${hasOlder||R.weekOffset>-52?"":"disabled"}>◀</button>
    <div class="week-label">${fmtD(mon)} — ${fmtD(dom)}</div>
    <button onclick="R.weekOffset++;renderReport()" ${R.weekOffset<0?"":"disabled"}>▶</button>
  </div>`;

  // Week overview grid
  h += `<div class="section-title">Visão da Semana</div><div class="week-grid">`;
  const dayNames = ["SEG","TER","QUA","QUI","SEX","SÁB","DOM"];
  for (let i = 0; i < 7; i++) {
    const info = wd.days[i];
    const done = info && info.hasData;
    const tab = info ? info.tab : TABS[i];
    const isPast = info && info.date <= today();
    h += `<div class="day-cell ${done?"done":isPast?"missed":""}">
      <div class="dc-day">${dayNames[i]}</div>
      <div class="dc-icon">${tab.icon}</div>
      <div class="dc-status" style="color:${done?"var(--green)":"var(--text-light)"}">${done?"✓":"—"}</div>
    </div>`;
  }
  h += `</div>`;

  // Summary cards
  const kcalDelta = totals.totalKcal - prevTotals.totalKcal;
  const minsDelta = totals.totalMins - prevTotals.totalMins;
  const sessDelta = totals.sessions - prevTotals.sessions;
  const deltaColor = v => v > 0 ? "var(--green)" : v < 0 ? "var(--orange)" : "var(--text-light)";
  const deltaStr = v => v > 0 ? `+${v}` : String(v);

  h += `<div class="summary-cards">
    <div class="sum-card"><div class="val" style="color:var(--green)">${totals.sessions}/7</div>
      <div class="lbl">Sessões</div>
      ${prevTotals.sessions>0?`<div class="delta" style="color:${deltaColor(sessDelta)}">${deltaStr(sessDelta)} vs sem. anterior</div>`:""}</div>
    <div class="sum-card"><div class="val" style="color:var(--orange)">${totals.totalKcal}</div>
      <div class="lbl">kcal total (aeróbico)</div>
      ${prevTotals.totalKcal>0?`<div class="delta" style="color:${deltaColor(kcalDelta)}">${deltaStr(kcalDelta)} kcal</div>`:""}</div>
    <div class="sum-card"><div class="val" style="color:var(--blue)">${totals.totalMins}</div>
      <div class="lbl">Minutos (aeróbico)</div>
      ${prevTotals.totalMins>0?`<div class="delta" style="color:${deltaColor(minsDelta)}">${deltaStr(minsDelta)} min</div>`:""}</div>
    <div class="sum-card"><div class="val" style="color:var(--purple)">${Math.round(totals.sessions/7*100)}%</div>
      <div class="lbl">Consistência</div></div>
  </div>`;

  // Weight progression
  const allExIds = new Set();
  for (const gk of ["TER","QUI","SAB"]) {
    const wk = GYM[gk];
    for (const g of wk.groups) for (const ex of g.exercises) {
      if ((S.data[ex.id]||[]).length > 0) allExIds.add(ex.id);
    }
  }

  if (allExIds.size > 0) {
    h += `<div class="section-title">Progressão de Carga</div>`;
    const NUM_WKS = 6;

    for (const gk of ["TER","QUI","SAB"]) {
      const wk = GYM[gk];
      for (const g of wk.groups) for (const ex of g.exercises) {
        if (!allExIds.has(ex.id)) continue;
        const hist = getExerciseHistory(ex.id, NUM_WKS);
        if (hist.length === 0) continue;
        const maxW = Math.max(...hist.map(h=>h.weight));
        const lastTwo = hist.slice(-2);
        let deltaH = "";
        if (lastTwo.length === 2) {
          const d = lastTwo[1].weight - lastTwo[0].weight;
          if (d !== 0) { const dc = d>0 ? "var(--green)" : "var(--orange)"; const ds = d>0 ? "+" : ""; deltaH = '<span style="color:'+dc+';font-size:11px;font-weight:600">'+ds+d.toFixed(1)+'kg</span>'; }
        }

        h += `<div class="prog-card">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="prog-name">${ex.name}</div>${deltaH}
          </div>
          <div class="prog-bars" style="margin-bottom:14px">`;
        hist.forEach((hh, idx) => {
          const pct = maxW > 0 ? Math.max(8, (hh.weight / maxW) * 100) : 8;
          const isLast = idx === hist.length - 1;
          const barColor = isLast ? wk.color : "#ccc";
          h += `<div class="prog-bar" style="height:${pct}%;background:${barColor}">
            <div class="pb-val" style="color:${isLast?wk.color:"var(--text-light)"}">${hh.weight}</div>
            <div class="pb-wk">${fmtD(hh.week)}</div>
          </div>`;
        });
        h += `</div></div>`;
      }
    }
  }

  // Aero comparison
  const aeroIds = [{id:"tennis_mon",name:"Tênis (Seg)",color:"#7B2D8E"},
                   {id:"run_wed",name:"Corrida (Qua)",color:"#00796B"},
                   {id:"tennis_fri",name:"Tênis (Sex)",color:"#7B2D8E"},
                   {id:"free_sun",name:"Livre (Dom)",color:"#E65100"}];
  const hasAero = aeroIds.some(a => (S.data[a.id]||[]).length > 0);

  if (hasAero) {
    h += `<div class="section-title">Atividades Aeróbicas</div>`;
    for (const a of aeroIds) {
      const hist = getAeroHistory(a.id, 6);
      if (hist.length === 0) continue;
      const maxK = Math.max(...hist.map(h=>h.kcal), 1);
      const maxM = Math.max(...hist.map(h=>h.mins), 1);
      const lastTwo = hist.slice(-2);

      h += `<div class="aero-compare"><div class="ac-title" style="color:${a.color}">${a.name}</div>`;
      // Kcal bars
      h += `<div style="font-size:10px;color:var(--text-light);margin-bottom:4px">Calorias (kcal)</div>`;
      hist.forEach(hh => {
        const pct = (hh.kcal / maxK) * 100;
        h += `<div class="ac-row"><span class="ac-label">${fmtD(hh.week)}</span>
          <div class="ac-bar-bg"><div class="ac-bar" style="width:${pct}%;background:${a.color}"></div></div>
          <span class="ac-val">${hh.kcal} kcal</span></div>`;
      });
      // Minutes bars
      h += `<div style="font-size:10px;color:var(--text-light);margin:8px 0 4px">Duração (min)</div>`;
      hist.forEach(hh => {
        const pct = (hh.mins / maxM) * 100;
        h += `<div class="ac-row"><span class="ac-label">${fmtD(hh.week)}</span>
          <div class="ac-bar-bg"><div class="ac-bar" style="width:${pct}%;background:${a.color};opacity:.6"></div></div>
          <span class="ac-val">${hh.mins} min</span></div>`;
      });
      h += `</div>`;
    }
  }

  // Export as text
  h += `<button class="share-btn" onclick="exportReport()">📋 Copiar Relatório como Texto</button>`;

  if (allExIds.size === 0 && !hasAero) {
    h += `<div class="no-data">Nenhum dado registrado ainda.<br>Comece a salvar seus treinos para ver o relatório!</div>`;
  }

  h += `</div></div>`;
  document.getElementById("app").insertAdjacentHTML("beforeend", h);
}

function exportReport() {
  const dates = getWeekDates(R.weekOffset);
  const totals = getWeekTotals(dates);
  const mon = dates[0], dom = dates[6];
  let txt = `📊 RELATÓRIO SEMANAL\n${fmtD(mon)} — ${fmtD(dom)}\n${"─".repeat(30)}\n\n`;
  txt += `Sessões: ${totals.sessions}/7 (${Math.round(totals.sessions/7*100)}%)\n`;
  txt += `Kcal aeróbico: ${totals.totalKcal}\n`;
  txt += `Minutos aeróbico: ${totals.totalMins}\n\n`;

  for (const gk of ["TER","QUI","SAB"]) {
    const wk = GYM[gk];
    txt += `🏋️ ${wk.title} (${wk.day})\n`;
    for (const g of wk.groups) for (const ex of g.exercises) {
      const entries = S.data[ex.id] || [];
      const weekEntry = entries.find(e => dates.includes(e.date));
      if (weekEntry) txt += `  ${ex.name}: ${weekEntry.weight}kg\n`;
    }
    txt += `\n`;
  }

  const aeroIds = [{id:"tennis_mon",n:"Tênis (Seg)"},{id:"run_wed",n:"Corrida (Qua)"},{id:"tennis_fri",n:"Tênis (Sex)"},{id:"free_sun",n:"Livre (Dom)"}];
  for (const a of aeroIds) {
    const entry = (S.data[a.id]||[]).find(e => dates.includes(e.date));
    if (entry) {
      let v = [];
      if (entry.kcal) v.push(`${entry.kcal} kcal`);
      if (entry.mins) v.push(`${entry.mins} min`);
      if (entry.act) v.push(entry.act);
      txt += `${a.n}: ${v.join(" · ")}\n`;
    }
  }

  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(() => flash("✓ Relatório copiado!")).catch(() => prompt("Copie:", txt));
  else prompt("Copie:", txt);
}

render();
</script>
